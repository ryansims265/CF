  ),
  Sparkles: () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/>
    </svg>
  ),
  Download: () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  ),
  CSV: () => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13v5M12 13v5M15 13v5"/></svg>
  ),
  X: () => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
  ),
  Lock: () => (
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  ),
};

/* ==================== Cane Detail Drawer ==================== */
/* -------------------- Cane Detail Drawer -------------------- */

const { useState: dUseState, useEffect: dUseEffect, useRef: dUseRef, useMemo: dUseMemo } = React;

// Mock occupancy: any combo where slot is "03" or "09" is occupied (matches mass-apply logic)
function checkOccupancy(loc) {
  if (!loc.v || !loc.t || !loc.l || !loc.p || !loc.cn || !loc.s) return null;
  const occupied = (loc.s === '03' || loc.s === '09') && loc.v === 'A' && loc.t === '04' && loc.cn === '07';
  return occupied ? 'occupied' : 'available';
}


/* -------------------- Discrepancy View (full table view) -------------------- */
function DiscrepancyView({ rows, onClose, onOpenCane }) {
  const flagged = rows.filter(r => r.flagged && !r.removed);
  const manualAdds = rows.filter(r => r.manual && !r.removed && !r.flagged && !r.resolvedDiscrepancy);
  const removed = rows.filter(r => r.removed);
  const resolved = rows.filter(r => r.resolvedDiscrepancy && !r.removed && !r.flagged);
  const tableRows = [];

  // Flagged discrepancies (field-level)
  flagged.forEach(r => {
    const detail = r.discrepancyDetail;
    if (detail && detail.fields && Object.keys(detail.fields).length > 0) {
      Object.entries(detail.fields).forEach(([key, v]) => {
        tableRows.push({
          type: 'flag',
          caneId: r.id, rfid: r.rfid, patient: r.patient, mrn: r.mrn, shipper: r.shipper,
          stage: r.stage, flagType: r.flagType || 'Identification discrepancy',
          field: key, expected: v.expected, actual: v.actual,
          note: detail.note || r.flagNote || '',
          followUps: r.followUps || [], files: [], transportBack: false, actionBy: '', actionAt: null,
        });
      });
    } else {
      tableRows.push({
        type: 'flag',
        caneId: r.id, rfid: r.rfid, patient: r.patient, mrn: r.mrn, shipper: r.shipper,
        stage: r.stage, flagType: r.flagType || 'Flagged',
        field: '', expected: '', actual: '',
        note: r.flagNote || '',
        followUps: r.followUps || [], files: [], transportBack: false, actionBy: '', actionAt: null,
      });
    }
  });

  // Resolved discrepancies (kept on the report for traceability)
  resolved.forEach(r => {
    const rd = r.resolvedDiscrepancy;
    tableRows.push({
      type: 'resolved',
      caneId: r.id, rfid: r.rfid, patient: r.patient, mrn: r.mrn, shipper: r.shipper,
      stage: r.stage, flagType: (rd.type || 'Discrepancy') + ' — Resolved' + (rd.transportBack ? ' · transport back' : ''),
      field: '\u2014', expected: '\u2014', actual: '\u2014',
      note: `Resolved by ${rd.by || 'operator'}: ${rd.note || ''}${rd.files && rd.files.length ? ` · ${rd.files.length} file${rd.files.length === 1 ? '' : 's'} attached` : ''}`,
      followUps: r.followUps || [], files: rd.files || [], transportBack: !!rd.transportBack, actionBy: rd.by || '', actionAt: rd.at || null,
    });
  });

  // Manually added canes
  manualAdds.forEach(r => {
    tableRows.push({
      type: 'manual',
      caneId: r.id, rfid: r.rfid, patient: r.patient, mrn: r.mrn, shipper: r.shipper,
      stage: r.stage, flagType: 'Manually Added',
      field: '\u2014', expected: 'Not on manifest', actual: 'Added during intake',
      note: 'Cane was not on the original manifest and was added by the operator.',
      followUps: r.followUps || [], files: [], transportBack: false, actionBy: '', actionAt: null,
    });
  });

  // Removed / missing canes
  removed.forEach(r => {
    const missing = r.stage === 'identification';
    tableRows.push({
      type: 'removed',
      caneId: r.id, rfid: r.rfid, patient: r.patient, mrn: r.mrn, shipper: r.shipper,
      stage: r.stage, flagType: missing ? 'Missing from shipment' : 'Removed from list',
      field: '\u2014', expected: 'On manifest', actual: missing ? 'Not in shipment' : 'Removed by operator',
      note: missing ? 'Cane was on the manifest but not found in the shipment.' : (r.removedReason ? `${r.removedReason}${r.removedDoc ? ' — ' + r.removedDoc : ''}` : (r.removedBy ? `Removed by ${r.removedBy}` : 'Removed by operator')),
      followUps: r.followUps || [], files: [], transportBack: false, actionBy: r.removedFlagBy || r.removedBy || '', actionAt: r.removedFlagAt || r.removedAt || null,
    });
  });

  const stageLabel = (s) => s === 'identification' ? 'ID Canes' : (s === 'verified' ? 'Ready to Store' : 'Stored');

  const exportCSV = () => {
    const typeLabel = (t) => t === 'manual' ? 'Manually Added' : t === 'removed' ? 'Removed' : t === 'resolved' ? 'Resolved' : 'Flagged';
    const fmtTs = (ts) => ts ? new Date(ts).toLocaleString() : '';
    const fmtFollow = (fus) => (fus || []).map(f => `${f.note} (${fmtEventTime(f.at)}, ${f.by}${f.files && f.files.length ? `, ${f.files.length} file${f.files.length === 1 ? '' : 's'}` : ''})`).join(' | ');
    const headers = ['Type','Cane RFID','Patient','MRN','Shipper','Stage','Flag Type','Field','Expected','Actual','Notes','Transport Back','Action By','Action At','Attached Files','Follow-ups'];
    const lines = [headers.join(',')];
    tableRows.forEach(r => {
      const cells = [
        typeLabel(r.type), (r.rfid && r.rfid !== '\u2014') ? r.rfid : '', r.patient, r.mrn,
        r.shipper ? `S${r.shipper}` : '\u2014', stageLabel(r.stage), r.flagType, r.field, r.expected, r.actual, r.note,
        r.type === 'resolved' ? (r.transportBack ? 'Yes' : 'No') : '',
        r.actionBy || '', fmtTs(r.actionAt),
        (r.files || []).join('; '),
        fmtFollow(r.followUps),
      ];
      lines.push(cells.map(c => `"${String(c || '').replace(/"/g, '""')}"`).join(','));
    });
    const blob = new Blob([lines.join('\n')], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `discrepancies_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,padding:'14px 0',borderBottom:'1px solid #2a2d36'}}>
        <button onClick={onClose} className="btn-outline" style={{padding:'6px 12px',fontSize:12}}>‹ Back to worksheet</button>
        <div style={{flex:1}}>
          <h2 style={{margin:0,fontSize:22,fontWeight:500,color:'#fff',display:'flex',alignItems:'center',gap:10}}>
            <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:30,height:30,borderRadius:'50%',background:'rgba(249,128,128,0.15)',color:'#f98080'}}><Icon.Warn/></span>
            Discrepancies
          </h2>
          <div style={{fontSize:13,color:'#9ca3af',marginTop:3}}>
            {(() => {
              const distinct = new Set([...flagged, ...manualAdds, ...removed, ...resolved].map(r => r.id)).size;
              const open = flagged.length + manualAdds.length;
              const parts = [];
              if (open) parts.push(`${open} open`);
              if (resolved.length) parts.push(`${resolved.length} resolved`);
              if (removed.length) parts.push(`${removed.length} removed`);
              return `${distinct} cane${distinct === 1 ? '' : 's'} tracked${parts.length ? ' — ' + parts.join(', ') : ''}`;
            })()}
          </div>
        </div>
        <button onClick={exportCSV} disabled={tableRows.length === 0} className="btn-outline" style={{padding:'8px 16px',fontSize:12.5,opacity:tableRows.length === 0 ? 0.5 : 1,cursor:tableRows.length === 0 ? 'not-allowed' : 'pointer'}}>
          <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Download/>Export CSV</span>
        </button>
      </div>

      {tableRows.length === 0 ? (
        <div style={{padding:60,textAlign:'center',color:'#6b7280',fontSize:14,background:'#0f1117',border:'1px solid #2a2d36',borderRadius:8}}>
          <div style={{fontSize:32,marginBottom:10,opacity:0.5}}>\u2713</div>
          No discrepancies flagged yet.
        </div>
      ) : (
        <div className="table-wrap">
          <div className="cf-scroll">
            <table className="cf">
              <thead>
                <tr>
                  <th style={{width:150}}>Action</th>
                  <th style={{width:80}}>Type</th>
                  <th style={{width:70}}>Shipper</th>
                  <th>Cane RFID</th>
                  <th>Patient</th>
                  <th>MRN</th>
                  <th>Stage</th>
                  <th>Flag Type</th>
                  <th>Field</th>
                  <th>Expected</th>
                  <th>Actual</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                {tableRows.map((r, i) => (
                  <tr key={i} className="flagged">
                    <td>
                      <button onClick={() => onOpenCane(r.caneId)} className="btn-outline" style={{padding:'5px 14px',fontSize:11.5}}>Open</button>
                    </td>
                    <td>{
                      r.type === 'manual' ? <span style={{padding:'2px 8px',borderRadius:3,background:'rgba(96,165,250,0.15)',color:'#60a5fa',fontSize:11,fontWeight:600}}>Manual</span>
                      : r.type === 'removed' ? <span style={{padding:'2px 8px',borderRadius:3,background:'rgba(156,163,175,0.15)',color:'#9ca3af',fontSize:11,fontWeight:600}}>Removed</span>
                      : r.type === 'resolved' ? <span style={{padding:'2px 8px',borderRadius:3,background:'rgba(34,197,94,0.15)',color:'#4ade80',fontSize:11,fontWeight:600}}>Resolved</span>
                      : <span style={{padding:'2px 8px',borderRadius:3,background:'rgba(249,128,128,0.15)',color:'#f98080',fontSize:11,fontWeight:600}}>Flag</span>
                    }</td>
                    <td>{r.shipper ? <span className="shipper-pill">S{r.shipper}</span> : <span style={{color:'#6b7280',fontSize:12}}>—</span>}</td>
                    <td><span className="mono" style={{color:'#cbd5e1',fontSize:11.5,fontWeight:600}}>{r.rfid && r.rfid !== '\u2014' ? r.rfid : '\u2014'}</span></td>
                    <td>{r.patient}</td>
                    <td><span className="mono" style={{color:'#9ca3af',fontSize:11.5}}>{r.mrn}</span></td>
                    <td><span style={{padding:'2px 8px',borderRadius:3,background:'rgba(255,255,255,0.05)',color:'#9ca3af',fontSize:11,fontWeight:500}}>{stageLabel(r.stage)}</span></td>
                    <td style={{color: r.type === 'resolved' ? '#4ade80' : '#f98080',fontWeight:500}}>{r.flagType}</td>
                    <td style={{color:'#e5e7eb',fontWeight:500}}>{r.field || '\u2014'}</td>
                    <td style={{color:'#9ca3af'}}>{r.expected || '\u2014'}</td>
                    <td style={{color:'#f98080',fontWeight:500}}>{r.actual || '\u2014'}</td>
                    <td style={{color:'#d1d5db',fontSize:12,maxWidth:280}}>{r.note || '\u2014'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function CaneDrawer({
  row, rowIndex, totalRows,
  onClose, onPrev, onNext,
  onSetLocation, onSaveFlag, onResolveFlag, onAddFlag, onRemoveFlag,
  onToggleManual, onRemoveRow, onConfirmIdentify,
  onRequestResolve, onRequestRemove, onRequestFollowUp, fromDiscrepancy,
}) {
  const drawerRef = dUseRef(null);
  const photoRef = dUseRef(null);
  const fileRef = dUseRef(null);

  // Section state — reset per row
  const [loc, setLoc] = dUseState({
    v: row.loc?.v || '', t: row.loc?.t || '', l: row.loc?.l || '',
    p: row.loc?.p || '', cn: row.loc?.cn || '', s: row.loc?.s || '',
  });

  // Identification workflow state
  const [photos, setPhotos] = dUseState([]);
  const [files, setFiles] = dUseState([]);
  const [printed, setPrinted] = dUseState(false);
  const [printing, setPrinting] = dUseState(false);
  const [associating, setAssociating] = dUseState(false);
  const [tagAssociated, setTagAssociated] = dUseState(false);
  const [discrepancy, setDiscrepancy] = dUseState(false);
  const [discrepancyFields, setDiscrepancyFields] = dUseState({});
  const [discrepancyNote, setDiscrepancyNote] = dUseState('');
  const [damaged, setDamaged] = dUseState(false);

  // Re-init state when row changes
  dUseEffect(() => {
    setLoc({
      v: row.loc?.v || '', t: row.loc?.t || '', l: row.loc?.l || '',
      p: row.loc?.p || '', cn: row.loc?.cn || '', s: row.loc?.s || '',
    });
    setPhotos([]); setFiles([]);
    setPrinted(false); setPrinting(false); setAssociating(false); setTagAssociated(false);
    setDiscrepancy(false); setDiscrepancyFields({}); setDiscrepancyNote(''); setDamaged(false);
  }, [row.id]);

  // Esc / nav keys
  dUseEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowLeft' && (e.metaKey || e.altKey)) onPrev();
      else if (e.key === 'ArrowRight' && (e.metaKey || e.altKey)) onNext();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose, onPrev, onNext]);

  const occupancy = dUseMemo(() => checkOccupancy(loc), [loc]);
  const allFilled = loc.v && loc.t && loc.l && loc.p && loc.cn && loc.s;

  const setF = (k, v) => setLoc(prev => ({ ...prev, [k]: v }));

  // Discrepancy helpers
  const toggleDiscField = (key, expected) => {
    setDiscrepancyFields(prev => {
      if (prev[key]) { const next = {...prev}; delete next[key]; return next; }
      return {...prev, [key]: {expected, actual: ''}};
    });
  };
  const setDiscActual = (key, value) => {
    setDiscrepancyFields(prev => ({...prev, [key]: {...prev[key], actual: value}}));
  };
  const fieldsValid = Object.keys(discrepancyFields).length > 0 && Object.values(discrepancyFields).every(f => f.actual?.trim());
  const discValid = !discrepancy || damaged || fieldsValid;

  // Photo/file handlers
  const handlePhoto = (e) => {
    const fs = Array.from(e.target.files || []);
    if (!fs.length) return;
    const newPhotos = fs.map(f => ({ name: f.name, url: URL.createObjectURL(f), type: f.type }));
    setPhotos(prev => [...prev, ...newPhotos]);
    e.target.value = '';
  };
  const removePhoto = (idx) => setPhotos(prev => prev.filter((_, i) => i !== idx));
  const handleFiles = (e) => {
    const fs = Array.from(e.target.files || []);
    setFiles(prev => [...prev, ...fs.map(f => ({ name: f.name, size: f.size }))]);
  };
  const removeFile = (idx) => setFiles(prev => prev.filter((_, i) => i !== idx));

  const triggerPrint = () => {
    setPrinting(true);
    setTimeout(() => { setPrinting(false); setPrinted(true); }, 700);
  };

  // Once the tag is printed it appears on the handheld scanner. Simulate the
  // operator scanning it — the association auto-completes 3s after printing.
  dUseEffect(() => {
    if (!printed) { setAssociating(false); setTagAssociated(false); return; }
    if (tagAssociated) return;
    setAssociating(true);
    const t = setTimeout(() => { setAssociating(false); setTagAssociated(true); }, 5000);
    return () => clearTimeout(t);
  }, [printed]);

  // Stage flags
  const isIdent = row.stage === 'identification';
  const isAssignStage = row.stage === 'verified';
  const isPlaced = row.stage === 'placed';

  // Fields the operator confirms against the physical cane (and can flag inline).
  const confirmFields = [
    { key: 'Patient Name',     expected: row.patient },
    { key: 'Patient ID / MRN', expected: row.mrn || '\u2014', mono: true },
    { key: 'Date of Birth',    expected: row.dob || '\u2014', mono: true },
    { key: 'Cane tab color',   expected: row.capLabel || 'Blue', swatch: row.capColor || '#3b82f6' },
    { key: 'Cane tab label',   expected: row.tabLabel || '\u2014', mono: true },
    { key: 'Specimen Type',    expected: row.specimens.join(' \u00b7 ') },
    { key: 'Devices',          expected: String(row.deviceCount || 4) },
    { key: 'Reactivity',       expected: row.reactivity || 'Unknown', tone: row.reactivity === 'Reactive' ? {color:'#f98080',fontWeight:600} : row.reactivity === 'Pending' ? {color:'#fbbf24'} : undefined },
    { key: 'FDA Eligibility',  expected: row.fdaEligibility || 'Unknown', tone: row.fdaEligibility === 'Ineligible' ? {color:'#f98080',fontWeight:600} : row.fdaEligibility === 'Incomplete' ? {color:'#fbbf24'} : undefined },
    { key: 'Freeze Date',      expected: row.freezeDate || '\u2014', mono: true },
  ];

  // Confirm gate (identification only)
  const canConfirm = photos.length >= 1 && printed && tagAssociated && discValid;

  const StatusBadge = () => {
    if (row.flagged) return <span className="badge flagged"><span className="dotty"/>Flagged</span>;
    if (row.stage === 'placed') return <span className="badge atcf"><Icon.Check size={9}/>Stored</span>;
    if (row.status === 'assigned') return <span className="badge atcf" title="Location assigned. Awaiting vault scan to confirm placement."><span className="dotty"/>Awaiting vault scan</span>;
    if (row.status === 'proposed') return <span className="badge proposed"><span className="dotty"/>Location proposed</span>;
    if (row.stage === 'verified') return <span className="badge intransit"><span className="dotty"/>Needs location</span>;
    return <span className="badge intransit"><span className="dotty"/>Needs ID</span>;
  };

  // Confirm Identification handler
  const onConfirmIdentClick = () => {
    onConfirmIdentify(row.id, {
      photos: photos.map(p => ({ name: p.name, url: p.url, type: p.type })),
      files: files.map(f => f.name),
      printedAt: Date.now(),
      discrepancy: discrepancy ? { fields: discrepancyFields, note: discrepancyNote, damaged } : null,
    });
  };

  return (
    <>
      <div className="drawer-overlay" onClick={onClose}/>
      <aside className="cane-drawer" ref={drawerRef} role="dialog" aria-label="Cane details">
        {/* Header */}
        <header className="dr-header">
          <div className="dr-head-row">
            <div className="dr-head-titles">
              <div className="dr-title" style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <span>{row.patient}</span>
                <StatusBadge/>
              </div>
              <div className="dr-sub">
                {row.id}
                {row.rfid && row.rfid !== '\u2014' && <span className="mono" style={{marginLeft:10,color:'#9ca3af'}}>RFID {row.rfid}</span>}
                {row.manual && <span className="badge manual" style={{marginLeft:8,verticalAlign:'middle'}}>Manually Added</span>}
              </div>
            </div>
            <div className="dr-head-actions">
              {isIdent && (
                <button
                  className={`dr-qa-btn flag ${discrepancy ? 'on' : ''}`}
                  onClick={() => { setDiscrepancy(!discrepancy); if (discrepancy) { setDiscrepancyFields({}); setDiscrepancyNote(''); setDamaged(false); } }}
                  title="Flag a field that does not match, mark the cane damaged, or flag it missing">
                  <Icon.Warn/>{discrepancy ? 'Flagging' : 'Mark Discrepancy'}
                </button>
              )}
              <button className="dr-close" onClick={onClose} aria-label="Close drawer"><Icon.X/></button>
            </div>
          </div>
        </header>

        {/* Scrollable body */}
        <div className="dr-body">

          {/* Cane Details — doubles as the inline discrepancy flagging surface */}
          <section className="dr-section">
            <div className="dr-section-label" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
              <span>Confirm against the physical cane</span>
              {isIdent && discrepancy && <span style={{color:'#f98080',fontWeight:600,fontSize:10.5,textTransform:'none',letterSpacing:0}}>Tap “Flag” on any field that differs</span>}
            </div>
            <div className="dr-readonly-grid">
              {confirmFields.map(f => {
                const flagged = !!discrepancyFields[f.key];
                const flagMode = isIdent && discrepancy;
                return (
                  <div key={f.key} className="rd-cell" style={flagged ? {background:'rgba(249,128,128,0.06)',border:'1px solid rgba(249,128,128,0.3)',borderRadius:6,padding:8} : undefined}>
                    <div className="rd-label" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
                      <span>{f.key}</span>
                      {flagMode && (
                        <button
                          onClick={() => toggleDiscField(f.key, f.expected)}
                          title={flagged ? 'Remove this flag' : 'Flag this field as different from the manifest'}
                          style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 7px',fontSize:9.5,fontWeight:700,fontFamily:'inherit',borderRadius:4,cursor:'pointer',textTransform:'none',letterSpacing:0,border:'1px solid '+(flagged?'#f98080':'rgba(249,128,128,0.45)'),background:flagged?'#f98080':'transparent',color:flagged?'#2a0e0e':'#f98080'}}>
                          <Icon.Warn/>{flagged?'Flagged':'Flag'}
                        </button>
                      )}
                    </div>
                    <div className={`rd-value ${f.mono?'mono':''}`} style={f.tone}>
                      {flagMode && flagged && <span style={{color:'#9ca3af',fontWeight:500,fontFamily:'var(--font-sans)'}}>Expected: </span>}
                      {f.swatch
                        ? <span><span style={{display:'inline-block',width:11,height:11,borderRadius:'50%',background:f.swatch,marginRight:8,verticalAlign:'middle',border:'1px solid rgba(255,255,255,0.2)'}}/>{f.expected}</span>
                        : f.expected}
                    </div>
                    {flagMode && flagged && (
                      <div style={{marginTop:6}}>
                        <input value={discrepancyFields[f.key]?.actual || ''} onChange={(e) => setDiscActual(f.key, e.target.value)} placeholder="Actual value on cane"
                          style={{width:'100%',padding:'5px 8px',fontSize:12,background:'#0f1117',border:'1px solid #2a2d36',borderRadius:4,color:'#fff',fontFamily:'inherit'}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {isIdent && discrepancy && (
              <div style={{marginTop:12}}>
                <div style={{display:'flex',gap:10,marginBottom:10}}>
                  <button
                    onClick={() => setDamaged(d => !d)}
                    title="Flag this cane as physically damaged"
                    style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,padding:'9px 11px',borderRadius:6,fontSize:12.5,fontWeight:600,fontFamily:'inherit',cursor:'pointer',border:'1px solid #f98080',color:'#f98080',background:damaged?'rgba(249,128,128,0.16)':'transparent'}}>
                    <Icon.Warn/>{damaged ? 'Damaged ✓' : 'Mark as damaged'}
                  </button>
                  <button
                    onClick={() => { if (confirm('Flag ' + row.id + ' as missing from the shipment? It will be tracked as a discrepancy and removed from the worklist.')) { onRemoveRow(row.id); onClose(); } }}
                    title="Flag this cane as missing from the shipment (tracked as a discrepancy)"
                    style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,padding:'9px 11px',borderRadius:6,fontSize:12.5,fontWeight:600,fontFamily:'inherit',cursor:'pointer',border:'1px solid #f98080',color:'#f98080',background:'transparent'}}>
                    <Icon.Warn/>Flag as missing
                  </button>
                </div>
                {!damaged && Object.keys(discrepancyFields).length === 0 && (
                  <div style={{padding:'5px 8px',background:'rgba(249,128,128,0.08)',border:'1px solid rgba(249,128,128,0.2)',borderRadius:3,fontSize:10.5,color:'#f98080',marginBottom:8}}>Flag at least one field above, mark the cane damaged, flag it missing, or turn off Mark Discrepancy.</div>
                )}
                <label style={{display:'block',fontSize:11,color:'#9ca3af',fontWeight:600,marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em'}}>Discrepancy notes{damaged ? ' (damage detail)' : ''}</label>
                <textarea value={discrepancyNote} onChange={(e) => setDiscrepancyNote(e.target.value)} rows={2} placeholder={damaged ? 'Describe the damage (crack, frost, missing label, etc.).' : 'Optional context for the client report.'} style={{width:'100%',padding:'7px 10px',fontSize:12.5,background:'#0f1117',border:'1px solid #2a2d36',borderRadius:4,color:'#fff',fontFamily:'inherit',resize:'vertical'}}/>
              </div>
            )}
          </section>

          {/* ============ DISCREPANCY — flag/manual, with resolve + remove ============ */}
          {(() => {
            const isManualOpen = row.manual && !row.resolvedDiscrepancy;
            const isOpenDisc = row.flagged || isManualOpen;
            const flagType = row.flagType || (row.manual ? 'Manually Added' : 'Flagged');
            if (!isOpenDisc && !row.resolvedDiscrepancy) return null;
            return (
              <section className="dr-section">
                <div className="dr-section-label">Discrepancy</div>
                {isOpenDisc ? (
                  <div style={{padding:10,background:'rgba(249,128,128,0.05)',border:'1px solid rgba(249,128,128,0.25)',borderRadius:6}}>
                    <span className="badge flagged" style={{padding:'5px 10px',display:'inline-flex',alignItems:'center',gap:4}}><Icon.Warn/>{flagType}</span>
                    {row.flagNote && <div style={{fontSize:11.5,color:'#9ca3af',marginTop:8,lineHeight:1.5}}>{row.flagNote}</div>}
                    {row.manual && !row.flagged && <div style={{fontSize:11.5,color:'#9ca3af',marginTop:8,lineHeight:1.5}}>Cane was not on the original manifest and was added by the operator.</div>}
                    {row.followUps && row.followUps.length > 0 && (
                      <div style={{marginTop:10,borderTop:'1px solid rgba(249,128,128,0.18)',paddingTop:8}}>
                        <div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600,marginBottom:6}}>Follow-ups</div>
                        {row.followUps.map((f, i) => (
                          <div key={i} style={{fontSize:11.5,color:'#cbd5e1',lineHeight:1.5,marginBottom:7}}>
                            <div>{f.note}</div>
                            <div style={{fontSize:10.5,color:'#6b7280',marginTop:2}}>{fmtEventTime(f.at)} · {f.by}{f.files && f.files.length ? ` · ${f.files.length} file${f.files.length===1?'':'s'}` : ''}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
                      <button
                        className="btn-outline"
                        style={{padding:'7px 14px',fontSize:12.5}}
                        onClick={() => onRequestFollowUp({ caneId: row.id, rfid: row.rfid, flagType })}>
                        Add follow-up
                      </button>
                      <button
                        className="btn-teal"
                        style={{padding:'7px 14px',fontSize:12.5}}
                        onClick={() => onRequestResolve({ caneId: row.id, rfid: row.rfid, flagType })}>
                        <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Check size={11}/>Resolve</span>
                      </button>
                      <button
                        className="btn-outline"
                        style={{padding:'7px 14px',fontSize:12.5,borderColor:'rgba(249,128,128,0.4)',color:'#f98080'}}
                        onClick={() => onRequestRemove({ type: row.flagged ? 'flag' : 'manual', caneId: row.id, rfid: row.rfid })}>
                        Remove from report
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:10,background:'rgba(34,197,94,0.05)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:6}}>
                    <span style={{color:'#4ade80',display:'inline-flex',alignItems:'center',gap:6,fontSize:12.5,fontWeight:600}}><Icon.Check size={11}/>Resolved — {row.resolvedDiscrepancy.type}</span>
                    {row.resolvedDiscrepancy.transportBack && <div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:6,padding:'3px 9px',borderRadius:4,background:'rgba(96,165,250,0.12)',border:'1px solid rgba(96,165,250,0.3)',color:'#93c5fd',fontSize:11,fontWeight:600}}>Transport back to clinic requested</div>}
                    {row.resolvedDiscrepancy.note && <div style={{fontSize:11.5,color:'#9ca3af',marginTop:8,lineHeight:1.5}}>{row.resolvedDiscrepancy.note}</div>}
                    {row.resolvedDiscrepancy.files && row.resolvedDiscrepancy.files.length > 0 && <div style={{fontSize:11,color:'#6b7280',marginTop:6}}>{row.resolvedDiscrepancy.files.length} file{row.resolvedDiscrepancy.files.length===1?'':'s'} attached</div>}
                    {row.followUps && row.followUps.length > 0 && (
                      <div style={{marginTop:10,borderTop:'1px solid rgba(34,197,94,0.18)',paddingTop:8}}>
                        <div style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600,marginBottom:6}}>Follow-ups</div>
                        {row.followUps.map((f, i) => (
                          <div key={i} style={{fontSize:11.5,color:'#cbd5e1',lineHeight:1.5,marginBottom:7}}>
                            <div>{f.note}</div>
                            <div style={{fontSize:10.5,color:'#6b7280',marginTop:2}}>{fmtEventTime(f.at)} · {f.by}{f.files && f.files.length ? ` · ${f.files.length} file${f.files.length===1?'':'s'}` : ''}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </section>
            );
          })()}

          {/* ============ CANE PHOTOS (verified/placed — ID evidence) ============ */}
          {!isIdent && row.idPhotos && row.idPhotos.length > 0 && (
            <section className="dr-section">
              <div className="dr-section-label">Cane photos</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {row.idPhotos.map((p, i) => p && p.url ? (
                  <a key={i} href={p.url} target="_blank" rel="noreferrer" style={{display:'block'}}>
                    <img src={p.url} alt={p.name || 'cane photo'} style={{width:76,height:76,objectFit:'cover',borderRadius:6,border:'1px solid #2a2d36',display:'block'}}/>
                  </a>
                ) : (
                  <div key={i} title={p && p.name} style={{width:76,height:76,borderRadius:6,border:'1px solid #2a2d36',background:'#0f1117',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,color:'#6b7280',fontSize:8.5,textAlign:'center',padding:5,overflow:'hidden'}}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M8 6l1.5-2h5L16 6" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{whiteSpace:'nowrap',textOverflow:'ellipsis',overflow:'hidden',maxWidth:'100%'}}>{p && p.name ? p.name : 'photo'}</span>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:'#6b7280',marginTop:6}}>Captured at identification. Tap a photo to view full size.</div>
            </section>
          )}

          {/* ============ ACTIVITY TRAIL — what happened, who, where ============ */}
          {row.events && row.events.length > 0 && (
            <section className="dr-section">
              <div className="dr-section-label">Activity</div>
              <div className="dr-timeline">
                {[...row.events].reverse().map((ev, idx) => (
                  <div key={idx} className="dr-tl-item">
                    <span className={`dr-tl-dot ${ev.type || ''}`}/>
                    <span className="dr-tl-text">{eventLine(ev)}</span>
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* ============ IDENTIFICATION WORKFLOW (identification stage only) ============ */}
          {isIdent && (
            <>
              {/* Print RFID Tag — printed first, then affixed and photographed */}
              <section className="dr-section">
                <div className="dr-section-label">Print RFID Tag <span style={{color:'#fbbf24',fontWeight:600,marginLeft:4}}>required</span></div>
                {!printed ? (
                  <button onClick={triggerPrint} disabled={printing} className="btn-teal" style={{padding:'8px 16px',fontSize:12.5,opacity:printing?0.5:1,cursor:printing?'not-allowed':'pointer'}}>
                    {printing ? 'Sending to printer...' : (
                      <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 5V2h8v3M3 11h-.5a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-.5.5H11M3 9h8v3.5a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5V9z" stroke="currentColor" strokeWidth="1.3" strokeLinejoin="round"/></svg>
                        Print RFID Tag
                      </span>
                    )}
                  </button>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'7px 11px',background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:5,fontSize:12}}>
                    <span style={{color:'#4ade80',display:'inline-flex',alignItems:'center',gap:5}}><Icon.Check size={11}/>Tag printed at Workstation 1</span>
                    <button onClick={() => { setPrinted(false); triggerPrint(); }} style={{background:'none',border:'none',color:'#60a5fa',cursor:'pointer',fontSize:11.5,fontFamily:'inherit',marginLeft:'auto'}}>Reprint</button>
                  </div>
                )}
                <div style={{fontSize:11,color:'#6b7280',marginTop:6}}>Print the tag and affix it to the cane. Printed tags appear on the handheld scanner automatically.</div>
              </section>

              {/* Associate RFID Tag — handheld scan */}
              <section className="dr-section">
                <div className="dr-section-label">Associate RFID Tag <span style={{color:'#fbbf24',fontWeight:600,marginLeft:4}}>required</span></div>
                {!printed ? (
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 11px',background:'rgba(255,255,255,0.02)',border:'1px solid #2a2d36',borderRadius:5,fontSize:12,color:'#6b7280'}}>
                    <Icon.Lock/>Print the RFID tag first.
                  </div>
                ) : associating ? (
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',background:'rgba(96,165,250,0.06)',border:'1px solid rgba(96,165,250,0.3)',borderRadius:5,fontSize:12.5}}>
                    <span className="tag-scan-dot" style={{width:9,height:9,borderRadius:'50%',background:'#60a5fa',flex:'0 0 auto'}}/>
                    <span style={{color:'#bfdbfe'}}>Waiting for handheld scan… associating RFID <span className="mono" style={{color:'#fff'}}>{row.rfid}</span></span>
                    <span style={{marginLeft:'auto',color:'#6b7280',fontSize:11}}>CryoFuture Signal</span>
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 11px',background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:5,fontSize:12.5}}>
                    <span style={{color:'#4ade80',display:'inline-flex',alignItems:'center',gap:5}}><Icon.Check size={11}/>RFID <span className="mono" style={{color:'#fff'}}>{row.rfid}</span> associated</span>
                    <span style={{marginLeft:'auto',color:'#6b7280',fontSize:11}}>via CryoFuture Signal</span>
                  </div>
                )}
                <div style={{fontSize:11,color:'#6b7280',marginTop:6}}>Scan the printed tag on the handheld to bind it to this cane. (Demo: completes automatically a few seconds after printing.)</div>
              </section>

              {/* Photos */}
              <section className="dr-section">
                <div className="dr-section-label">Cane Photos or Video <span style={{color:'#fbbf24',fontWeight:600,marginLeft:4}}>1 required</span></div>
                <input ref={photoRef} type="file" accept="image/*,video/*" capture="environment" multiple style={{display:'none'}} onChange={handlePhoto}/>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:6}}>
                  {photos.map((p, i) => {
                    const isVideo = p.type?.startsWith('video') || /\.(mp4|mov|webm)$/i.test(p.name || '');
                    return (
                      <div key={i} style={{position:'relative',width:80,height:80,borderRadius:6,overflow:'hidden',border:'1px solid #2a2d36',background:'#0f1117'}}>
                        {isVideo ? <video src={p.url} muted style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                                 : <img src={p.url} alt={`Cane ${i+1}`} style={{width:'100%',height:'100%',objectFit:'cover'}}/>}
                        {isVideo && <span style={{position:'absolute',top:3,left:3,padding:'1px 5px',background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:9,fontWeight:600,borderRadius:3}}>▶ VIDEO</span>}
                        <button onClick={() => removePhoto(i)} style={{position:'absolute',top:3,right:3,background:'rgba(0,0,0,0.65)',border:'none',color:'#fff',width:18,height:18,borderRadius:3,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',padding:0}}><Icon.X/></button>
                      </div>
                    );
                  })}
                  <button onClick={() => photoRef.current?.click()} style={{width:80,height:80,borderRadius:6,border:'1px dashed #4F4F4F',background:'transparent',color:'#9ca3af',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,fontSize:11,fontFamily:'inherit'}}>
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M14 11v2.5a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5V11M5 6l3-3 3 3M8 3v8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span>Add media</span>
                  </button>
                </div>
              </section>

              {/* Additional Files */}
              <section className="dr-section">
                <div className="dr-section-label">Additional Files <span style={{color:'#6b7280',fontWeight:500,marginLeft:4}}>optional</span></div>
                <div style={{fontSize:11.5,color:'#9ca3af',marginBottom:8}}>ElPro logs, transport docs, or other QC evidence.</div>
                <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={handleFiles}/>
                <button onClick={() => fileRef.current?.click()} className="btn-outline" style={{padding:'7px 14px',fontSize:12,marginTop:4}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
                    Attach files
                  </span>
                </button>
                {files.length > 0 && (
                  <ul style={{listStyle:'none',padding:0,margin:'10px 0 0'}}>
                    {files.map((f, i) => (
                      <li key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',fontSize:11.5,borderBottom:'1px solid #2a2d36'}}>
                        <span className="mono" style={{flex:1,color:'#d1d5db'}}>{f.name}</span>
                        <span style={{color:'#6b7280'}}>{Math.round(f.size/1024)} KB</span>
                        <button onClick={() => removeFile(i)} style={{background:'none',border:'none',color:'#f98080',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>Remove</button>
                      </li>
                    ))}
                  </ul>
                )}
              </section>

              {/* Discrepancy flagging now happens inline in the grid up top */}
            </>
          )}

          {/* ============ LOCATION (verified/placed stages) ============ */}
          {((isAssignStage && !fromDiscrepancy) || isPlaced) && (
            <section className="dr-section">
              <div className="dr-section-label">{isPlaced ? 'Final Location' : 'Assign Location'}</div>
              {isPlaced ? (
                <div className="dr-loc-grid">
                  {[
                    { lbl: 'Vault', v: loc.v },
                    { lbl: 'Tank', v: loc.t },
                    { lbl: 'Level', v: loc.l },
                    { lbl: 'Pie', v: loc.p },
                    { lbl: 'Canister', v: loc.cn },
                    { lbl: 'Slot', v: loc.s },
                  ].map(f => (
                    <div key={f.lbl} className="dr-field">
                      <label>{f.lbl}</label>
                      <div className="dr-loc-readonly mono">{f.v || '—'}</div>
                    </div>
                  ))}
                </div>
              ) : (
              <>
              <div className="dr-loc-grid">
                <div className="dr-field"><label>Vault</label>
                  <select value={loc.v} onChange={e => setF('v', e.target.value)}>
                    <option value="">—</option>
                    <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                  </select>
                </div>
                <div className="dr-field"><label>Tank</label>
                  <select value={loc.t} onChange={e => setF('t', e.target.value)}>
                    <option value="">—</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option>
                  </select>
                </div>
                <div className="dr-field"><label>Level</label>
                  <select value={loc.l} onChange={e => setF('l', e.target.value)}>
                    <option value="">—</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                  </select>
                </div>
                <div className="dr-field"><label>Pie</label>
                  <select value={loc.p} onChange={e => setF('p', e.target.value)}>
                    <option value="">—</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                  </select>
                </div>
                <div className="dr-field"><label>Canister</label>
                  <select value={loc.cn} onChange={e => setF('cn', e.target.value)}>
                    <option value="">—</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option>
                  </select>
                </div>
                <div className="dr-field"><label>Slot</label>
                  <select value={loc.s} onChange={e => setF('s', e.target.value)}>
                    <option value="">—</option>
                    {['01','02','03','04','05','06','07','08','09','10','11','12'].map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
              </div>

              <div className={`occupancy-pill ${occupancy || 'idle'}`}>
                {occupancy === 'available' && <><span className="oc-dot"/>Available · slot is free</>}
                {occupancy === 'occupied' && <><span className="oc-dot"/>Occupied · choose a different slot</>}
                {!occupancy && <><span className="oc-dot"/>Occupancy check · fill all six fields to verify</>}
              </div>
              </>
              )}
            </section>
          )}

        </div>

        {/* Footer */}
        <footer className="dr-footer" style={{flexDirection:'column',alignItems:'stretch',gap:8,padding:'12px 16px'}}>
          {/* Primary CTA */}
          {isIdent && (() => {
            const need = [
              !printed ? 'print the RFID tag' : null,
              (printed && !tagAssociated) ? 'scan the tag on the handheld to associate it' : null,
              photos.length < 1 ? 'take at least one photo or video' : null,
              (discrepancy && !discValid) ? 'fill in the flagged field value(s)' : null,
            ].filter(Boolean);
            const blockReason = need.length ? 'Still needed: ' + need.join(', ') : '';
            return (
              <button
                className="btn-teal"
                disabled={!canConfirm}
                onClick={onConfirmIdentClick}
                title={canConfirm ? 'Confirm identification and move this cane to Ready to Store' : blockReason}
                style={{padding:'9px 16px',fontSize:13,fontWeight:600,opacity:canConfirm?1:0.5,cursor:canConfirm?'pointer':'not-allowed'}}>
                {discrepancy ? 'Confirm Identification with Flag' : 'Confirm Identification'}
              </button>
            );
          })()}
          {isAssignStage && !fromDiscrepancy && (
            <button
              className="btn-teal"
              disabled={!allFilled || occupancy === 'occupied'}
              onClick={() => onSetLocation(row.id, loc)}
              title={occupancy === 'occupied' ? 'That slot is already occupied — choose a different location' : (!allFilled ? 'Fill in all location fields (vault, tank, pie, canister, slot) to save' : 'Save this location')}
              style={{padding:'9px 16px',fontSize:13,fontWeight:600,opacity:(!allFilled || occupancy === 'occupied')?0.5:1,cursor:(!allFilled || occupancy === 'occupied')?'not-allowed':'pointer'}}>
              Save Location
            </button>
          )}

          {/* Position */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span className="dr-nav-pos">Cane {rowIndex + 1} of {totalRows}</span>
          </div>
        </footer>
      </aside>
    </>
  );
}

/* ==================== Identify Modal ==================== */
/* -------------------- Identify Modal -------------------- */

const { useState: imUseState, useRef: imUseRef, useEffect: imUseEffect } = React;

function IdentifyModal({ row, onCancel, onConfirm }) {
  const [photos, setPhotos] = imUseState([]); // 1 required
  const [files, setFiles] = imUseState([]);
  const [printed, setPrinted] = imUseState(false);
  const [printing, setPrinting] = imUseState(false);
  // Discrepancy flag state
  const [discrepancy, setDiscrepancy] = imUseState(false);
  const [discrepancyFields, setDiscrepancyFields] = imUseState({}); // {fieldKey: {expected, actual}}
  const [discrepancyNote, setDiscrepancyNote] = imUseState('');
  const toggleDiscrepancyField = (key, expected) => {
    setDiscrepancyFields(prev => {
      if (prev[key]) {
        const next = {...prev};
        delete next[key];
        return next;
      }
      return {...prev, [key]: {expected, actual: ''}};
    });
  };
  const setDiscrepancyActual = (key, value) => {
    setDiscrepancyFields(prev => ({...prev, [key]: {...prev[key], actual: value}}));
  };
  const discrepancyValid = !discrepancy || (Object.keys(discrepancyFields).length > 0 && Object.values(discrepancyFields).every(f => f.actual?.trim()));
  const photoRef = imUseRef(null);
  const fileRef = imUseRef(null);

  imUseEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);

  const triggerPrint = () => {
    setPrinting(true);
    setTimeout(() => { setPrinting(false); setPrinted(true); }, 700);
  };

  const handlePhoto = (e) => {
    const fs = Array.from(e.target.files || []);
    if (!fs.length) return;
    const newPhotos = fs.map(f => ({ name: f.name, url: URL.createObjectURL(f), type: f.type }));
    setPhotos(prev => [...prev, ...newPhotos]);
    e.target.value = '';
  };
  const removePhoto = (idx) => setPhotos(prev => prev.filter((_, i) => i !== idx));
  const handleFiles = (e) => {
    const fs = Array.from(e.target.files || []);
    setFiles(prev => [...prev, ...fs.map(f => ({ name: f.name, size: f.size }))]);
  };
  const removeFile = (idx) => setFiles(prev => prev.filter((_, i) => i !== idx));

  const canConfirm = photos.length >= 1 && printed && discrepancyValid;

  return (
    <>
      <div className="im-overlay" onClick={onCancel}/>
      <div className="im-modal" role="dialog" aria-label="Identify cane">
        <header className="im-header">
          <div className="im-pat-block">
            <div className="im-eyebrow">Identification · Verify Patient</div>
            <div className="im-pat-row">
              <div className="im-cap" style={{background: row.capColor || '#3b82f6'}} title={`Cane tab color: ${row.capLabel || 'Blue'}`}>
                <span className="im-cap-shine"/>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div className="im-pat-name">{row.patient}</div>
                <div className="im-pat-meta">
                  <span className="mono">{row.mrn}</span>
                  <span className="im-dot-sep">·</span>
                  <span>{row.clinic}</span>
                </div>
              </div>
              <button className="dr-close" onClick={onCancel} aria-label="Close"><Icon.X/></button>
            </div>
            <div className="im-pat-chips">
              <span className="im-chip"><span className="im-chip-label">Cane ID</span><span className="mono">{row.id}</span></span>
              <span className="im-chip"><span className="im-chip-label">Cane tab</span>{row.capLabel || 'Blue'}</span>
              <span className="im-chip"><span className="im-chip-label">Specimens</span>{row.specimens.join(' · ')}</span>
              <span className="im-chip"><span className="im-chip-label">Devices</span><strong style={{color:'#fff'}}>{row.deviceCount || 4}</strong></span>
              <span className="im-chip" style={row.reactivity === 'Reactive' ? {borderColor:'rgba(249,128,128,0.45)', background:'rgba(249,128,128,0.06)'} : undefined}>
                <span className="im-chip-label">Reactivity</span>
                <span style={row.reactivity === 'Reactive' ? {color:'#f98080', fontWeight:600} : row.reactivity === 'Pending' ? {color:'#fbbf24'} : undefined}>
                  {row.reactivity || 'Unknown'}
                </span>
              </span>
              <span className="im-chip">
                <span className="im-chip-label">Freeze date</span>
                <span className="mono">{row.freezeDate || '—'}</span>
              </span>
            </div>
            <div className="im-verify-prompt">→ Confirm cane in hand matches before continuing.</div>
          </div>
        </header>

        <div className="im-body">

          {/* Step A: Photos */}
          <section className="im-section">
            <div className="im-section-head">
              <span className="im-step">A</span>
              <div>
                <div className="im-section-title">Cane Photos or Video <span className="im-required">1 required</span></div>
                <div className="im-section-sub">Capture {photos.length < 2 ? `at least ${2 - photos.length} more` : 'optional 3rd angle'} — e.g. cane top, side, or label.</div>
              </div>
              {photos.length >= 1 && <span className="im-check"><Icon.Check size={11}/></span>}
            </div>
            <input ref={photoRef} type="file" accept="image/*,video/*" capture="environment" multiple style={{display:'none'}} onChange={handlePhoto}/>
            <div className="im-photo-grid">
              {photos.map((p, i) => {
                const isVideo = p.type?.startsWith('video') || /\.(mp4|mov|webm)$/i.test(p.name || '');
                return (
                  <div className="im-photo-tile" key={i}>
                    {isVideo
                      ? <video src={p.url} muted style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                      : <img src={p.url} alt={`Cane ${i+1}`}/>}
                    {isVideo && (
                      <span style={{position:'absolute',top:4,left:4,padding:'2px 5px',background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:9,fontWeight:600,borderRadius:3}}>▶ VIDEO</span>
                    )}
                    <button className="im-photo-remove" onClick={() => removePhoto(i)} title="Remove"><Icon.X/></button>
                    <span className="im-photo-num">{i+1}</span>
                  </div>
                );
              })}
              <button className="im-photo-add" onClick={() => photoRef.current?.click()}>
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M14 11v2.5a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5V11M5 6l3-3 3 3M8 3v8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <span>Add photo</span>
                  <span className="im-photo-progress">{photos.length} photo{photos.length !== 1 ? 's' : ''}</span>
                </button>
            </div>
          </section>

          {/* Step B: Optional attachments */}
          <section className="im-section">
            <div className="im-section-head">
              <span className="im-step">B</span>
              <div>
                <div className="im-section-title">Additional Files <span style={{color:'#6b7280',fontSize:10.5,fontWeight:500,marginLeft:4}}>optional</span></div>
                <div className="im-section-sub">ElPro logs, transport docs, or other QC evidence.</div>
              </div>
            </div>
            <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={handleFiles}/>
            <button className="im-upload-btn ghost" onClick={() => fileRef.current?.click()}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
              Attach files
            </button>
            {files.length > 0 && (
              <ul className="im-file-list">
                {files.map((f, i) => (
                  <li key={i}>
                    <span className="mono">{f.name}</span>
                    <span style={{color:'#6b7280',fontSize:10.5}}>{Math.round(f.size/1024)} KB</span>
                    <button className="im-link-btn" onClick={() => removeFile(i)}>Remove</button>
                  </li>
                ))}
              </ul>
            )}
          </section>

          {/* Discrepancy Flag */}
          <section className="im-section">
            <div className="im-section-head">
              <span className="im-step" style={{background: discrepancy ? 'rgba(249,128,128,0.18)' : undefined, color: discrepancy ? '#f98080' : undefined}}>⚠</span>
              <div style={{flex: 1}}>
                <div className="im-section-title">
                  Flag Discrepancy
                  <span style={{color:'#6b7280',fontSize:10.5,fontWeight:500,marginLeft:6}}>optional · reported to client</span>
                </div>
                <div className="im-section-sub">Use this when actual cane data differs from what was expected. Intake continues, cane is flagged.</div>
              </div>
              <button onClick={() => { setDiscrepancy(!discrepancy); if (discrepancy) { setDiscrepancyFields({}); setDiscrepancyNote(''); } }} style={{
                padding: '5px 12px', fontSize: 11.5, fontWeight: 600,
                borderRadius: 9999, border: '1px solid',
                cursor: 'pointer', fontFamily: 'inherit',
                background: discrepancy ? 'rgba(249,128,128,0.12)' : 'transparent',
                borderColor: discrepancy ? 'rgba(249,128,128,0.4)' : '#3a3d46',
                color: discrepancy ? '#f98080' : '#9ca3af',
              }}>{discrepancy ? 'Discrepancy On' : 'Mark Discrepancy'}</button>
            </div>

            {discrepancy && (
              <div style={{marginTop:12, padding:14, background:'rgba(249,128,128,0.04)', border:'1px solid rgba(249,128,128,0.2)', borderRadius:8}}>
                <div style={{fontSize:11.5, color:'#9ca3af', marginBottom:10, lineHeight:1.5}}>
                  Select which fields differ, then enter the actual value observed. Cane will be intaken with a flag and included in the transport's discrepancy report.
                </div>

                {[
                  {key:'patient', label:'Patient Name', expected: row.patient},
                  {key:'specimens', label:'Specimen Type', expected: row.specimens.join(' · ')},
                  {key:'devices', label:'Device Count', expected: String(row.deviceCount || 4)},
                  {key:'capLabel', label:'Cane tab color', expected: row.capLabel || 'Blue'},
                  {key:'tabLabel', label:'Cane tab label', expected: row.tabLabel || '\u2014'},
                  {key:'reactivity', label:'Reactivity', expected: row.reactivity || 'Unknown'},
                  {key:'fdaEligibility', label:'FDA Eligibility', expected: row.fdaEligibility || 'Unknown'},
                  {key:'freezeDate', label:'Freeze Date', expected: row.freezeDate || '—'},
                ].map(f => {
                  const checked = !!discrepancyFields[f.key];
                  return (
                    <div key={f.key} style={{marginBottom:8, padding:8, background: checked ? 'rgba(249,128,128,0.06)' : 'transparent', border:'1px solid', borderColor: checked ? 'rgba(249,128,128,0.25)' : 'transparent', borderRadius:6}}>
                      <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:12.5}}>
                        <input type="checkbox" checked={checked} onChange={() => toggleDiscrepancyField(f.key, f.expected)} style={{cursor:'pointer'}}/>
                        <span style={{color:'#e5e7eb',fontWeight:500,minWidth:140}}>{f.label}</span>
                        <span style={{color:'#6b7280',fontSize:11}}>Expected:</span>
                        <span style={{color:'#9ca3af',fontSize:11.5}}>{f.expected}</span>
                      </label>
                      {checked && (
                        <div style={{marginTop:6, marginLeft:24, display:'flex', alignItems:'center', gap:8}}>
                          <span style={{color:'#f98080',fontSize:11,fontWeight:600,minWidth:50}}>Actual:</span>
                          <input
                            type="text"
                            value={discrepancyFields[f.key]?.actual || ''}
                            onChange={(e) => setDiscrepancyActual(f.key, e.target.value)}
                            placeholder="What was actually observed?"
                            style={{flex:1, padding:'5px 8px', fontSize:12, background:'#0f1117', border:'1px solid #2a2d36', borderRadius:4, color:'#fff', fontFamily:'inherit'}}/>
                        </div>
                      )}
                    </div>
                  );
                })}

                <div style={{marginTop:12}}>
                  <label style={{display:'block', fontSize:11, color:'#9ca3af', fontWeight:500, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em'}}>Additional notes</label>
                  <textarea
                    value={discrepancyNote}
                    onChange={(e) => setDiscrepancyNote(e.target.value)}
                    rows={2}
                    placeholder="Optional. Add any context for the client report."
                    style={{width:'100%', padding:'6px 8px', fontSize:12, background:'#0f1117', border:'1px solid #2a2d36', borderRadius:4, color:'#fff', fontFamily:'inherit', resize:'vertical'}}/>
                </div>

                {Object.keys(discrepancyFields).length === 0 && (
                  <div style={{marginTop:10, padding:'6px 10px', background:'rgba(249,128,128,0.08)', border:'1px solid rgba(249,128,128,0.2)', borderRadius:4, fontSize:11, color:'#f98080'}}>
                    Select at least one field that differs.
                  </div>
                )}
              </div>
            )}
          </section>

          {/* Step C: Print */}
          <section className={`im-section ${photos.length < 2 ? 'locked' : ''}`}>
            <div className="im-section-head">
              <span className="im-step">C</span>
              <div>
                <div className="im-section-title">Print RFID Tag <span className="im-required">required</span></div>
                <div className="im-section-sub">{photos.length < 2 ? `Upload at least 2 photos first.` : 'Affix the printed tag to the cane.'}</div>
              </div>
              {printed && <span className="im-check"><Icon.Check size={11}/></span>}
            </div>
            {!printed ? (
              <button
                className="im-print-btn"
                onClick={triggerPrint}
                disabled={!photos.length || printing}>
                {printing ? (
                  <><div className="im-scan-spinner small"/>Sending to printer…</>
                ) : (
                  <><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5V2h8v3M3 11h-.5a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-.5.5H11M3 9h8v3.5a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5V9z" stroke="currentColor" strokeWidth="1.3" strokeLinejoin="round"/></svg>Print RFID Tag</>
                )}
              </button>
            ) : (
              <div className="im-print-confirm">
                <span style={{display:'inline-flex',alignItems:'center',gap:6,color:'#4ade80'}}><Icon.Check size={11}/>Tag printed at Workstation 1</span>
                <button className="im-link-btn" onClick={() => { setPrinted(false); triggerPrint(); }}>Reprint</button>
              </div>
            )}
          </section>
        </div>

        <footer className="im-footer">
          <div className="im-checklist">
            <span className={photos.length >= 1 ? 'done' : ''}>{photos.length >= 1 ? '\u2713' : '\u25CB'} Photos ({photos.length}/1)</span>
            <span className={printed ? 'done' : ''}>{printed ? '\u2713' : '\u25CB'} Tag printed</span>
            
          </div>
          <div className="im-footer-actions">
            <button className="btn-outline" style={{padding:'7px 14px',fontSize:12.5}} onClick={onCancel}>Cancel</button>
            <button
              className="btn-teal"
              style={{padding:'7px 18px',fontSize:12.5,fontWeight:600}}
              disabled={!canConfirm}
              onClick={() => onConfirm({ photos: photos.map(p => p.name), files: files.map(f => f.name), printedAt: Date.now(), discrepancy: discrepancy ? { fields: discrepancyFields, note: discrepancyNote } : null })}>
              Confirm Identification
            </button>
          </div>
        </footer>
      </div>
    </>
  );
}

/* -------------------- Stepper -------------------- */
function Stepper({ status }) {
  const steps = [{ id: 'assigned', label: 'Assigned' }, { id: 'in_progress', label: 'In Progress' }, { id: 'completed', label: 'Completed' }];
  const idx = steps.findIndex(s => s.id === status);
  return (
    <div className="stepper-wrap">
      {steps.map((s, i) => {
        const cls = i < idx ? 'done' : i === idx ? 'active' : '';
        return (
          <React.Fragment key={s.id}>
            <span className={`step ${cls}`}>
              <span className="dot">{i <= idx ? <Icon.Check size={12}/> : <span style={{color:'#3a3f4b',fontSize:11}}>{i+1}</span>}</span>
              {s.label}
            </span>
            {i < steps.length - 1 && (
              <svg width="20" height="10" viewBox="0 0 20 10" fill="none" style={{flex:'none'}}>
                <path d="M2 5h16M14 1l4 4-4 4" stroke={i < idx ? '#18E3BB' : '#2a2d36'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* -------------------- Activity event formatting -------------------- */
function fmtEventTime(ts) {
  return new Date(ts).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
function eventLine(ev) {
  const parts = [ev.label];
  if (ev.loc) parts.push(`Tank ${parseInt(ev.loc.t, 10)} · Canister ${parseInt(ev.loc.cn, 10)} · Position ${parseInt(ev.loc.s, 10)}`);
  parts.push(fmtEventTime(ev.at));
  if (ev.device) parts.push(ev.device);
  if (ev.by) parts.push(ev.by);
  return parts.join(' · ');
}

/* -------------------- Shipper Bar -------------------- */
function ShipperBar({ shippers, currentShipper, counts, onAdvance, sealVerified = {} }) {
  const cur = shippers.find(s => s.id === currentShipper);
  const c = counts[currentShipper] || { total: 0, done: 0, remaining: 0, identified: 0 };
  const totalExpected = c.identified + (counts.unassigned || 0); // rough estimate for progress
  const pct = totalExpected > 0 ? Math.round((c.identified / totalExpected) * 100) : 0;
  const nextShipper = shippers.find(s => s.id === currentShipper + 1);
  const isLast = !nextShipper;
  return (
    <div className="shipper-bar">
      <div className="sb-left">
        <span className="sb-eyebrow">Active Shipper</span>
        <div className="sb-id-row">
          <span className="sb-num">{currentShipper}</span>

              Shipper {currentShipper}
              {(() => {
                const v = sealVerified[currentShipper];
                if (v?.caneTopVerifiedAt) return (
                  <span style={{

                    display:'inline-flex',alignItems:'center',gap:4,
                    padding:'2px 8px',borderRadius:9999,
                    background:'rgba(250,204,21,0.12)',color:'#FACC15',
                    fontSize:10.5,fontWeight:600,letterSpacing:'0.02em'
                  }}><Icon.Lock/>Canister photo pending</span>
                );
                return (
                  <span style={{
                    display:'inline-flex',alignItems:'center',gap:4,
                    padding:'2px 8px',borderRadius:9999,
                    background:'rgba(250,204,21,0.12)',color:'#FACC15',

          ? <span><strong style={{color:'#fff'}}>{resultCount}</strong> of {totalCount} canes match</span>

      </div>
      {rightSlot && <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>{rightSlot}</div>}
    </div>
  );
}

/* -------------------- Suggest Modal -------------------- */
const FRESH_CANISTERS = [
  { v:'A', tn:'04', pn:'1', cn:'09', sn:'01', label:'A · Tank 04 · Pie 1 · Canister 09', free: 24, recommended: true },
  { v:'A', tn:'04', pn:'2', cn:'02', sn:'01', label:'A · Tank 04 · Pie 2 · Canister 02', free: 24 },
  { v:'B', tn:'01', pn:'1', cn:'05', sn:'01', label:'B · Tank 01 · Pie 1 · Canister 05', free: 24 },
];
function SuggestModal({ onCancel, onApply, count }) {
  const [a, setA] = useState({ ...FRESH_CANISTERS[0] });
  const setField = (k, v) => setA(prev => ({ ...prev, [k]: v }));
  const isSel = (c) => a.v === c.v && a.tn === c.tn && a.pn === c.pn && a.cn === c.cn;
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onCancel]);
  return (
    <>
      <div className="im-overlay" onClick={onCancel}/>
      <div className="im-modal" style={{width:540}} role="dialog" aria-label="Suggest location">
        <header className="im-header">
          <div>
            <div className="im-eyebrow">Suggest Location</div>
            <div className="im-title" style={{marginTop:4}}>Choose a fresh canister and starting slot</div>
            <div className="im-sub" style={{marginTop:4}}>Slots fill sequentially from here. Pick a suggested canister or edit the starting location below.</div>
          </div>
          <button className="dr-close" onClick={onCancel} aria-label="Close"><Icon.X/></button>
        </header>
        <div className="im-body" style={{padding:'18px 22px', display:'flex', flexDirection:'column', gap:10}}>
          <div style={{fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Suggested fresh canisters</div>
          {FRESH_CANISTERS.map((c, i) => (
            <button key={i} className="sg-card" onClick={() => setA({ ...c })} style={isSel(c) ? {borderColor:'var(--cryo-cyan)', background:'rgba(24,227,187,0.06)'} : undefined}>
              <div className="sg-card-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                  <rect x="3" y="3" width="16" height="16" rx="2" stroke="currentColor" strokeWidth="1.5"/>
                  <path d="M11 7v8M7 11h8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              </div>
              <div className="sg-card-body">
                <div className="sg-card-title">Fresh canister {isSel(c) && <span style={{color:'var(--cryo-cyan)',fontWeight:700}}>· Selected</span>}</div>
                <div className="sg-card-anchor mono">{c.label}</div>
                <div className="sg-card-sub">{c.free} slots free</div>
              </div>
              {c.recommended && <span className="sg-card-pill recommend">Recommended</span>}
            </button>
          ))}
          <div style={{fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',marginTop:6}}>Starting location</div>
          <div className="loc-inputs">
            {LOC_FIELDS.map(f => (
              <div key={f.key} className="loc-seg">
                <span className="seg-lbl">{f.lbl}</span>
                {f.isSelect ? (
                  <select value={a[f.key] || ''} onChange={(e) => setField(f.key, e.target.value)} style={{width: f.width}}>
                    <option value="" disabled>{f.ph}</option>
                    {f.opts.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                ) : (
                  <input placeholder={f.ph} value={a[f.key] || ''} onChange={(e) => setField(f.key, e.target.value)} style={{width: f.width}}/>
                )}
              </div>
            ))}
          </div>
        </div>
        <footer className="im-footer">
          <div style={{fontSize:11.5, color:'#6b7280'}}>Fills from <span className="mono" style={{color:'#9ca3af'}}>{a.v||'A'} · Tank {a.tn||'04'} · Canister {a.cn||'07'} · Slot {a.sn||'01'}</span></div>
          <span style={{display:'flex',gap:8}}>
            <button className="btn-outline" style={{padding:'7px 14px',fontSize:12.5}} onClick={onCancel}>Cancel</button>
            <button className="btn-teal" style={{padding:'7px 14px',fontSize:12.5}} onClick={() => onApply(a)}>Apply to {count} cane{count === 1 ? '' : 's'}</button>
          </span>
        </footer>
      </div>
    </>
  );
}
