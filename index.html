/* -------------------- Step Card (used by SealVerifyPanel) -------------------- */
function StepCard({ active, complete, locked, stepLabel, title, sub, children, startHere }) {
  const focal = startHere && active && !complete;
  const phaseText = complete ? 'Done' : (active ? (focal ? 'Start here' : 'Do this next') : 'Locked');
  const phaseColor = complete ? '#4ade80' : (focal ? 'var(--cryo-cyan)' : (active ? '#FACC15' : '#6b7280'));
  return (
    <div style={{
      background: complete ? 'rgba(34,197,94,0.04)' : (focal ? 'rgba(24,227,187,0.05)' : (active ? 'rgba(250,204,21,0.04)' : 'rgba(255,255,255,0.02)')),
      border: '1px solid ' + (complete ? 'rgba(34,197,94,0.25)' : (focal ? 'rgba(24,227,187,0.45)' : (active ? 'rgba(250,204,21,0.25)' : 'rgba(255,255,255,0.06)'))),
      boxShadow: focal ? '0 0 0 1px rgba(24,227,187,0.25), 0 0 26px rgba(24,227,187,0.10)' : 'none',
      borderRadius: 12,
      padding: 20,
      opacity: locked ? 0.55 : 1,
      transition: 'all 0.2s',
    }}>
      <div style={{display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6}}>
        <span style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: 26, height: 26, borderRadius: '50%',
          background: complete ? 'rgba(34,197,94,0.18)' : (focal ? 'var(--cryo-cyan)' : (active ? 'rgba(250,204,21,0.15)' : 'rgba(255,255,255,0.05)')),
          color: complete ? '#4ade80' : (focal ? '#04201b' : (active ? '#FACC15' : '#6b7280')),
          fontSize: 12, fontWeight: 700,
        }}>{complete ? <Icon.Check size={11}/> : (locked ? <Icon.Lock/> : stepLabel)}</span>
        <div style={{flex: 1}}>
          <div style={{fontSize: 11, color: phaseColor, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', display:'flex', alignItems:'center', gap:6}}>
            {focal && <span style={{width:6,height:6,borderRadius:'50%',background:'var(--cryo-cyan)',display:'inline-block'}}/>}
            {phaseText}
          </div>
          <div style={{fontSize: 15, fontWeight: 500, color: '#fff', marginTop: 2}}>{title}</div>
          {sub && <div style={{fontSize: 12.5, color: '#9ca3af', marginTop: 4, lineHeight: 1.5}}>{sub}</div>}
        </div>
      </div>
      {!locked && children}
    </div>
  );
}

/* -------------------- Media Tile (image or video preview) -------------------- */
function MediaTile({ file, index, onRemove, size = 88 }) {
  const isVideo = file.type?.startsWith('video') || /\.(mp4|mov|webm)$/i.test(file.name || '');
  return (
    <div style={{position: 'relative', width: size, height: size, borderRadius: 6, overflow: 'hidden', border: '1px solid #2a2d36', background: '#0f1117'}}>
      {isVideo ? (
        <video src={file.url} style={{width: '100%', height: '100%', objectFit: 'cover'}} muted/>
      ) : (
        <img src={file.url} alt={`Media ${index+1}`} style={{width: '100%', height: '100%', objectFit: 'cover'}}/>
      )}
      {isVideo && (
        <span style={{
          position: 'absolute', top: 4, left: 4,
          padding: '2px 6px', background: 'rgba(0,0,0,0.6)', color: '#fff',
          fontSize: 9.5, fontWeight: 600, borderRadius: 3,
          display: 'inline-flex', alignItems: 'center', gap: 3
        }}>▶ VIDEO</span>
      )}
      {onRemove && (
        <button onClick={onRemove} style={{
          position: 'absolute', top: 4, right: 4,
          background: 'rgba(0,0,0,0.65)', border: 'none', color: '#fff',
          width: 20, height: 20, borderRadius: 3, cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: 0
        }}><Icon.X/></button>
      )}
      <span style={{position: 'absolute', bottom: 4, left: 6, fontSize: 10.5, color: 'rgba(255,255,255,0.85)', fontWeight: 600}}>{index + 1}</span>
    </div>
  );
}

/* -------------------- Photo/Video Uploader -------------------- */
function PhotoUploader({ photos, onAdd, onRemove, fileRef, ctaLabel, onComplete, isComplete, primary }) {
  const handle = (e) => {
    const fs = Array.from(e.target.files || []);
    if (!fs.length) return;
    const newOnes = fs.map(f => ({ name: f.name, url: URL.createObjectURL(f), type: f.type }));
    onAdd(newOnes);
    e.target.value = '';
  };
  return (
    <>
      <input ref={fileRef} type="file" accept="image/*,video/*" capture="environment" multiple style={{display: 'none'}} onChange={handle}/>
      <div style={{display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 12, marginBottom: isComplete ? 0 : 14, alignItems: 'center'}}>
        {photos.map((p, i) => (
          <MediaTile key={i} file={p} index={i} onRemove={!isComplete ? () => onRemove(i) : null}/>
        ))}
        {!isComplete && (
          <button onClick={() => fileRef.current?.click()} style={{
            height: 88, padding: '0 18px', borderRadius: 8,
            border: primary && photos.length === 0 ? '1px solid var(--cryo-cyan)' : '1px dashed #4F4F4F',
            background: primary && photos.length === 0 ? 'rgba(24,227,187,0.08)' : 'transparent',
            color: primary && photos.length === 0 ? 'var(--cryo-cyan)' : '#9ca3af',
            cursor: 'pointer', fontWeight: 600,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            gap: 6, fontSize: 12, fontFamily: 'inherit'
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M3 8.5A1.5 1.5 0 0 1 4.5 7h2l1-2h9l1 2h2A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5v-9z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
              <circle cx="12" cy="12.5" r="3.2" stroke="currentColor" strokeWidth="1.5"/>
            </svg>
            <span>{photos.length === 0 ? 'Take photo or video' : 'Add another'}</span>
          </button>
        )}
      </div>
      {!isComplete && (
        <div style={{display: 'flex', alignItems: 'center', gap: 12}}>
          <button onClick={onComplete} disabled={photos.length < 1}
            title={photos.length < 1 ? 'Take at least one photo or video before continuing' : ctaLabel}
            style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '9px 20px', fontSize: 13, fontWeight: 600,
            borderRadius: 9999, border: 'none',
            cursor: photos.length >= 1 ? 'pointer' : 'not-allowed',
            background: photos.length >= 1 ? 'linear-gradient(90deg, #1371FD 0%, #18E3BB 100%)' : '#2a2d36',
            color: photos.length >= 1 ? '#fff' : '#6b7280',
            fontFamily: 'inherit'
          }}>
            <Icon.Check size={11}/>{ctaLabel}
          </button>
          <span style={{fontSize: 12, color: '#6b7280'}}>
            {photos.length === 0 ? 'At least 1 photo or video required' : `${photos.length} file${photos.length === 1 ? '' : 's'} attached`}
          </span>
        </div>
      )}
    </>
  );
}

/* -------------------- Seal Verification Panel (two-step) -------------------- */
function SealVerifyPanel({ shipperId, shipperLabel, shipperSource, verification, onUpdate, onComplete, operator = 'Ryan Sims' }) {
  const [sealPhotos, setSealPhotos] = useState(verification?.sealPhotos || []);
  const [caneTopPhotos, setCaneTopPhotos] = useState(verification?.caneTopPhotos || []);
  const sealFileRef = useRef(null);
  const caneTopFileRef = useRef(null);

  const sealDone = !!verification?.sealVerifiedAt;

  const completeStepA = () => {
    onUpdate({
      sealPhotos: sealPhotos.map(p => ({name: p.name, url: p.url, type: p.type})),
      sealVerifiedAt: Date.now(),
      sealVerifiedBy: operator,
    });
  };

  const completeStepB = () => {
    onComplete({
      sealPhotos: (verification?.sealPhotos || []),
      sealVerifiedAt: verification?.sealVerifiedAt,
      sealVerifiedBy: verification?.sealVerifiedBy,
      caneTopPhotos: caneTopPhotos.map(p => ({name: p.name, url: p.url, type: p.type})),
      caneTopVerifiedAt: Date.now(),
      caneTopVerifiedBy: operator,
      verifiedBy: operator,
    });
  };

  return (
    <div style={{marginBottom: 16, display: 'flex', flexDirection: 'column', gap: 12}}>
      <div style={{fontSize: 12.5, color: '#9ca3af', lineHeight: 1.45}}>
        Verifying <strong style={{color: '#e5e7eb', fontWeight: 600}}>Shipper {shipperId}</strong>
      </div>

      <StepCard active={!sealDone} complete={sealDone} stepLabel="1a" startHere={!sealDone}
        title="Photo or video of the sealed shipper"
        sub="Capture the intact seal before opening. This is your chain-of-custody evidence that the shipper arrived sealed.">
        <PhotoUploader
          photos={sealDone ? (verification.sealPhotos || []) : sealPhotos}
          onAdd={(items) => setSealPhotos(prev => [...prev, ...items])}
          onRemove={(i) => setSealPhotos(prev => prev.filter((_, idx) => idx !== i))}
          fileRef={sealFileRef}
          ctaLabel="Open shipper"
          onComplete={completeStepA}
          isComplete={sealDone}
          primary={!sealDone}
        />
      </StepCard>

      <StepCard active={sealDone} complete={false} locked={!sealDone} stepLabel="1b"
        title="Photo or video of the canister (all cane tops visible)"
        sub={sealDone ? 'Open the shipper and capture the full canister in one frame so every cane top is visible. Verify the count and orientation match the manifest.' : 'Complete step 1a first.'}>
        <PhotoUploader

          onAdd={(items) => setCaneTopPhotos(prev => [...prev, ...items])}
          onRemove={(i) => setCaneTopPhotos(prev => prev.filter((_, idx) => idx !== i))}
          fileRef={caneTopFileRef}
          ctaLabel="Begin intake"
          onComplete={completeStepB}
          isComplete={false}
          primary={true}
        />
      </StepCard>
    </div>
  );
}

function App() {

  const TICKET = {

  };

  const [status, setStatus] = useState('assigned');
  const [tab, setTab] = useState('identification');
  const [sort, setSort] = useState('identification');
  const [sortDir, setSortDir] = useState('asc'); // asc = earliest identified first (A–Z)
  const [anchor, setAnchor] = useState({ v:'', tn:'', pn:'', cn:'', sn:'' });
  const [suggested, setSuggested] = useState(false);
  const [rows, setRows] = useState(genCanes());
  const completed = useMemo(() => genCompleted(), []);
  const [applied, setApplied] = useState(false);
  const [appliedSummary, setAppliedSummary] = useState(null);
  const [summaryDismissed, setSummaryDismissed] = useState(false);
  const [showSkipped, setShowSkipped] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [selected, setSelected] = useState([]);
  const [showCloseModal, setShowCloseModal] = useState(false);
  const [showAfterState, setShowAfterState] = useState(false);
  const [openRowId, setOpenRowId] = useState(null);
  const [discrepancySheetOpen, setDiscrepancySheetOpen] = useState(false);
  const flaggedCount = rows.filter(r => !r.removed && (r.flagged || (r.manual && !r.resolvedDiscrepancy))).length;
  const [currentShipper, setCurrentShipper] = useState(1);
  // sealVerified: { [shipperId]: { photos: [{name,url}], verifiedAt: ts, verifiedBy: email } }
  const [sealVerified, setSealVerified] = useState({});
  const [doneShippers, setDoneShippers] = useState([]);
  const [search, setSearch] = useState('');
  const [intakeComplete, setIntakeComplete] = useState(false);
  const [showCompleteModal, setShowCompleteModal] = useState(false);
  const [showAddCane, setShowAddCane] = useState(false);

  // suggest block tooltip auto-dismisses
  useEffect(() => {
    if (!suggested) return;
    const t = setTimeout(() => setSuggested(false), 4500);
    return () => clearTimeout(t);
  }, [suggested]);

  const [suggestOpen, setSuggestOpen] = useState(false);

  // Discrepancy resolve/remove modals (triggered from the cane drawer)
  const [resolveTarget, setResolveTarget] = useState(null);
  const [resolveNote, setResolveNote] = useState('');
  const [resolveFiles, setResolveFiles] = useState([]);
  const [resolveTransportBack, setResolveTransportBack] = useState(false);
  const resolveFileRef = useRef(null);
  const closeResolve = () => { setResolveTarget(null); setResolveNote(''); setResolveFiles([]); setResolveTransportBack(false); };
  const [removeTarget, setRemoveTarget] = useState(null);
  const [removeReason, setRemoveReason] = useState('');
  const [removeDoc, setRemoveDoc] = useState('');
  const closeRemove = () => { setRemoveTarget(null); setRemoveReason(''); setRemoveDoc(''); };
  const [followTarget, setFollowTarget] = useState(null);
  const [followNote, setFollowNote] = useState('');
  const [followFiles, setFollowFiles] = useState([]);
  const followFileRef = useRef(null);
  const closeFollow = () => { setFollowTarget(null); setFollowNote(''); setFollowFiles([]); };
  const handleSuggest = () => setSuggestOpen(true);
  const applySuggestion = (anchor) => {
    setAnchor(anchor);
    setSuggested(true);
    setSuggestOpen(false);
    doApply(anchor);
  };

  const doApply = (anchorArg) => {
    const a = { ...(anchorArg || anchor) };
    if (!a.v) Object.assign(a, { v:'A', tn:'04', pn:'1', cn:'07', sn:'01' });
    const startSlot = parseInt(a.sn || '01', 10);

    // Mass apply operates on Verified-stage canes, in the currently displayed order.
    const verifiedSorted = rows
      .filter(r => r.stage === 'verified' && !r.removed)
      .sort((x, y) => {
        const base = sort === 'import' ? (x.importIdx||0) - (y.importIdx||0) : (x.verifiedAt||0) - (y.verifiedAt||0);
        return sortDir === 'desc' ? -base : base;
      });

    const locByRowId = {};
    let cur = startSlot;
    let reactiveSkipped = 0;
    verifiedSorted.forEach(r => {
      // Reactive and Pending-reactivity canes are not auto-located — they require manual assignment.
      // Flagged (non-reactive) canes still get a slot in order; a flag is not a blocker.
      if (r.reactivity === 'Reactive' || r.reactivity === 'Pending') { reactiveSkipped += 1; return; }
      locByRowId[r.id] = { v: a.v, t: a.tn, p: a.pn, cn: a.cn, s: String(cur).padStart(2,'0') };
      cur += 1;
    });

    setRows(prev => prev.map(r => {
      if (locByRowId[r.id]) return { ...r, status: 'proposed', loc: locByRowId[r.id] };
      return r;
    }));
    setApplied(true);
    setStatus('in_progress');
    const assignedCount = Object.keys(locByRowId).length;
    setAppliedSummary({ assigned: assignedCount, reactiveSkipped });
    setShowConfirm(false);
    setShowAfterState(true);
    setSummaryDismissed(false);
  };

  const confirmRowLocation = (rowId) => {
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      const ev = { type: 'located', label: 'Location assigned', at, by: OPERATOR, loc: r.loc };
      return { ...r, status: 'assigned', events: [...(r.events || []), ev] };
    }));
  };
  const confirmAllProposed = () => {
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.status !== 'proposed') return r;
      const ev = { type: 'located', label: 'Location assigned', at, by: OPERATOR, loc: r.loc };
      return { ...r, status: 'assigned', events: [...(r.events || []), ev] };
    }));
  };
  const proposedCount = rows.filter(r => r.status === 'proposed').length;

  // Actor + device used for the cane activity trail (mocked in this prototype).
  const [assignee, setAssignee] = useState('John Smith (Me)');
  const OPERATOR = assignee.replace(/\s*\(Me\)$/, '');
  const DEVICE = 'CryoFuture Signal';

  // Vault placement scan: moves a location-confirmed, tag-bound cane to Stored.
  const placeRow = (rowId) => {
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      const ev = { type: 'stored', label: 'Stored', at, by: OPERATOR, device: DEVICE, loc: r.loc };
      return { ...r, stage: 'placed', placedAt: at, events: [...(r.events || []), ev] };
    }));
  };

  // Demo helper: fast-forward the whole batch to Stored so the end-state and
  // "Complete Intake" can be reviewed without processing all 50 canes by hand.
  const demoPlaceAll = () => {
    let slot = 10;
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.removed) return r;
      const loc = r.loc || { v:'A', t:'04', l:'2', p:'1', cn:'08', s: String(slot++).padStart(2,'0') };
      const ev = { type: 'stored', label: 'Stored', at, by: OPERATOR, device: DEVICE, loc };
      return { ...r, stage: 'placed', status: 'assigned', loc, placedAt: at, events: [...(r.events || []), ev] };
    }));
    setStatus('in_progress');
  };

  const lastUsedLoc = useMemo(() => {
    const withLoc = rows.filter(r => r.loc);
    if (withLoc.length === 0) return null;
    return withLoc[withLoc.length - 1].loc;
  }, [rows]);

  const handleSetLocation = (rowId, loc) => {
    const at = Date.now();
    setRows(rows.map(r => {
      if (r.id !== rowId) return r;
      const ev = { type: 'located', label: 'Location assigned', at, by: OPERATOR, loc };
      return { ...r, loc, status: 'assigned', events: [...(r.events || []), ev] };
    }));
    if (status === 'assigned') setStatus('in_progress');
  };

  const handleSaveFlag = (rowId, type, note) => {
    setRows(rows.map(r => r.id === rowId ? { ...r, flagType: type, flagNote: note } : r));
  };
  const handleResolveFlag = (rowId, type, note) => {
    setRows(rows.map(r => r.id === rowId ? { ...r, flagged: false, status: r.status === 'assigned' ? 'assigned' : 'requested', resolvedFlag: { type, note } } : r));
  };
  const handleAddFlag = (rowId, type, note) => {
    setRows(rows.map(r => r.id === rowId ? { ...r, flagged: true, flagType: type, flagNote: note } : r));
  };
  const handleAddManualCane = (data) => {
    const id = String(900000 + (Date.now() % 99999));
    const newRow = {
      id, importIdx: 9999,
      shipper: currentShipper,
      patient: (data.patient || '').trim() || 'Unnamed cane',
      mrn: (data.mrn || '').trim() || '\u2014',
      dob: (data.dob || '').trim() || '\u2014',
      rfid: '\u2014',
      clinic: (data.clinic || '').trim() || 'Clinic ABC',
      specimens: data.specimens ? data.specimens.split(' · ') : ['Unknown'],
      facility: (data.facility || '').trim() || 'Atlanta',
      reactivity: 'Pending', freezeDate: '\u2014',
      fdaEligibility: 'Incomplete',
      status: 'requested', loc: null,
      manual: true,
      capColor: '#a855f7', capLabel: 'Manual', deviceCount: 1,
      tabLabel: '\u2014',
      stage: 'identification',
    };
    setRows(prev => [newRow, ...prev]);
    setShowAddCane(false);
  };

  const handleToggleManual = (rowId) => {
    setRows(rows.map(r => r.id === rowId ? { ...r, manual: !r.manual } : r));
  };
  const handleRemoveRow = (rowId) => {
    // Soft-delete: mark as removed for audit trail and client reporting.
    setRows(prev => prev.map(r => r.id === rowId ? { ...r, removed: true, removedAt: Date.now(), removedBy: OPERATOR } : r));
    setOpenRowId(null);
  };

  const reset = () => {
    setRows(genCanes()); setAnchor({ v:'', tn:'', pn:'', cn:'', sn:'' });
    setApplied(false); setAppliedSummary(null); setStatus('assigned'); setSort('import');
    setSummaryDismissed(false); setShowSkipped(false); setSuggested(false);
    setShowConfirm(false); setSelected([]); setShowAfterState(false); setOpenRowId(null);
    setCurrentShipper(1); setDoneShippers([]); setSearch(''); setSealVerified({});
    setSortDir('asc'); setTab('identification');
    setIntakeComplete(false); setShowCompleteModal(false); setShowAddCane(false);
  };

  // Demo: skip the seal/canister photo capture for the current shipper.
  const demoSkipSeal = () => {
    const now = Date.now();
    setSealVerified(prev => ({ ...prev, [currentShipper]: {
      sealPhotos: [{ name: 'seal-photo.jpg' }],
      caneTopPhotos: [{ name: 'canister-photo.jpg' }],
      sealVerifiedAt: now - 120000,
      caneTopVerifiedAt: now - 60000,
      verifiedBy: 'Ryan Sims',
    }}));
    setTab('identification');
  };

  // Demo: promote a batch of canes to Ready to Store with assorted discrepancy types.
  const demoLoadDiscrepancies = () => {
    const at = Date.now() - 20 * 60 * 1000;
    let n = 0;
    setRows(prev => prev.map(r => {
      if (r.stage !== 'identification' || r.removed) return r;
      n += 1;
      if (n > 16) return r;
      const t = at + n * 60 * 1000;
      const evs = [
        { type: 'identified', label: 'Identity confirmed against manifest', at: t, by: 'Ryan Sims', device: 'CryoFuture Signal' },
        { type: 'rfid', label: 'RFID tag associated', at: t + 30000, by: 'Ryan Sims', device: 'CryoFuture Signal' },
      ];
      const base = { ...r, stage: 'verified', verifiedAt: t, shipper: r.shipper || currentShipper, idPhotos: [{ name: 'cane-front.jpg' }, { name: 'cane-cap.jpg' }], events: [...(r.events || []), ...evs] };
      switch (n % 6) {
        case 1: return { ...base, flagged: true, flagType: 'Specimen type mismatch', flagNote: 'Expected Embryos, actual cane carrier reads Oocyte.', discrepancyDetail: { fields: { 'Specimen Type': { expected: 'Embryos', actual: 'Oocyte' } }, note: 'Confirm with clinic before assigning a location.' } };
        case 2: return { ...base, flagged: true, flagType: 'Identification discrepancy', flagNote: '2 fields differ (Date of Birth, Cane tab color)', discrepancyDetail: { fields: { 'Date of Birth': { expected: r.dob, actual: '1990-01-01' }, 'Cane tab color': { expected: r.capLabel, actual: 'Green' } } } };
        case 3: return { ...base, flagged: true, flagType: 'Damaged cane', flagNote: 'Cane reported damaged; hairline crack near the cap.', discrepancyDetail: { fields: {}, damaged: true, note: 'Hairline crack near the cap.' } };
        case 4: return { ...base, flagged: true, flagType: 'Damaged + field discrepancy', flagNote: 'Cane reported damaged; 1 field differs (Patient ID / MRN)', discrepancyDetail: { fields: { 'Patient ID / MRN': { expected: r.mrn, actual: 'MRN-00000' } }, damaged: true } };
        case 5: return { ...base, manual: true };
        default: return base;
      }
    }));
    setTab('verified');
  };

  // Demo: jump to the fully-stored end state.
  const demoAllStored = () => { demoPlaceAll(); setTab('placed'); };

  const allRows = useMemo(() => [...rows, ...completed], [rows, completed]);
  const openRowIndex = openRowId ? allRows.findIndex(r => r.id === openRowId) : -1;
  const openRow = openRowIndex >= 0 ? allRows[openRowIndex] : null;
  const goPrev = () => { if (openRowIndex > 0) setOpenRowId(allRows[openRowIndex - 1].id); };
  const goNext = () => { if (openRowIndex >= 0 && openRowIndex < allRows.length - 1) setOpenRowId(allRows[openRowIndex + 1].id); };

  // Stage filtering — Identification = pending; Verified = identified; Placed = placed
  // Identification = pending. Reactive canes are ordered last and held until the
  // rest of the batch is identified (handled last to limit cross-contamination risk).
  const idRows = rows
    .filter(r => (r.stage || 'identification') === 'identification' && !r.removed)
    .sort((a, b) => {
      const ar = a.reactivity === 'Reactive' ? 1 : 0;
      const br = b.reactivity === 'Reactive' ? 1 : 0;
      if (ar !== br) return ar - br;
      return (a.importIdx || 0) - (b.importIdx || 0);
    });
  // Reactive canes stay locked while any non-reactive cane still needs identifying.
  const reactiveLocked = idRows.some(r => r.reactivity !== 'Reactive');
  const verifiedRows = rows.filter(r => r.stage === 'verified' && !r.removed).sort((a,b) => {
    const base = sort === 'import'
      ? (a.importIdx||0) - (b.importIdx||0)
      : (a.verifiedAt||0) - (b.verifiedAt||0); // identification order (default)
    return sortDir === 'desc' ? -base : base;
  });
  const placedRows   = rows.filter(r => r.stage === 'placed' && !r.removed);

  // Intake completion: every non-removed cane must reach the Placed stage.
  const liveRows = rows.filter(r => !r.removed);
  const placedDoneCount = liveRows.filter(r => r.stage === 'placed').length;
  const allPlaced = liveRows.length > 0 && placedDoneCount === liveRows.length;
  const openFlags = rows.filter(r => !r.removed && (r.flagged || (r.manual && !r.resolvedDiscrepancy))).length;
  const canComplete = allPlaced && openFlags === 0;
  const stageRows = tab === 'identification' ? idRows : tab === 'verified' ? verifiedRows : placedRows;
  const visibleCount = stageRows.length;
  const totalForTab = tab === 'identification' ? TICKET.canes : stageRows.length;

  // Shipper progress + filtering — shipper progress reflects Identification step
  const shipperCounts = useMemo(() => {
    const out = {};
    SHIPPERS.forEach(s => {
      // Identified-to-this-shipper count
      const identified = rows.filter(r => r.shipper === s.id && !r.removed).length;
      out[s.id] = { total: identified, done: identified, remaining: 0, identified };
    });
    // Total un-identified canes (no shipper yet)
    out.unassigned = rows.filter(r => !r.shipper && r.stage === 'identification' && !r.removed).length;
    return out;
  }, [rows]);

  const curShipperCanes = (SHIPPERS.find(s => s.id === currentShipper) || {}).canes || 0;
  const curIdentified = (shipperCounts[currentShipper] || {}).identified || 0;

  // How many canes each patient has in this transport (for the multi-cane indicator).
  const patientCounts = useMemo(() => {
    const m = {};
    rows.filter(r => !r.removed).forEach(r => { const k = r.mrn || r.patient; if (k) m[k] = (m[k] || 0) + 1; });
    return m;
  }, [rows]);

  // Scope: current tab's rows → current shipper (only on Identification) → search
  const tabRows = tab === 'identification' ? idRows : tab === 'verified' ? verifiedRows : placedRows;
  const currentShipperRows = useMemo(() => {
    if (tab !== 'identification') return tabRows;
    // Un-identified canes (no shipper yet) all show on the Identification tab.
    // Shipper is assigned during identification from currentShipper context.
    return tabRows;
  }, [tabRows, tab]);

  const searchedRows = useMemo(() => {
    if (!search.trim()) return currentShipperRows;
    const q = search.trim().toLowerCase();
    return currentShipperRows.filter(r =>
      r.patient.toLowerCase().includes(q) ||
      (r.mrn || '').toLowerCase().includes(q) ||
      (r.id || '').toLowerCase().includes(q) ||
      (r.rfid || '').toLowerCase().includes(q)
    );
  }, [currentShipperRows, search]);

  const handleSelectShipper = (id) => {
    setCurrentShipper(id);
    setSearch('');
  };

  // Identification action: opens modal; confirmIdentify advances stage.
  const [identifyRow, setIdentifyRow] = useState(null);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const showToast = (msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  };
  const handleIdentify = (row) => setOpenRowId(row.id);
  const confirmIdentify = (rowId, payload) => {
    const ts = Date.now();
    const target = rows.find(r => r.id === rowId);
    setRows(prev => prev.map(r => {
      if (r.id !== rowId) return r;
      // Assign shipper from current operator context if not already set
      const evs = [
        { type: 'identified', label: 'Identity confirmed against manifest', at: ts, by: OPERATOR, device: DEVICE },
        { type: 'rfid', label: 'RFID tag associated', at: ts + 30 * 1000, by: OPERATOR, device: DEVICE },
      ];
      const next = { ...r, stage: 'verified', verifiedAt: ts, idEvidence: payload, idPhotos: payload.photos || [], shipper: r.shipper || currentShipper, events: [...(r.events || []), ...evs] };
      if (payload?.discrepancy) {
        const d = payload.discrepancy;
        const fieldKeys = Object.keys(d.fields || {});
        const fieldCount = fieldKeys.length;
        next.flagged = true;
        const parts = [];
        if (d.damaged) parts.push('Cane reported damaged');
        if (fieldCount) parts.push(`${fieldCount} field${fieldCount === 1 ? '' : 's'} differ (${fieldKeys.join(', ')})`);
        next.flagType = d.damaged ? (fieldCount ? 'Damaged + field discrepancy' : 'Damaged cane') : 'Identification discrepancy';
        next.flagNote = `${parts.join('; ')}${d.note ? '. ' + d.note : ''}`;
        next.discrepancyDetail = d;
      }
      return next;
    }));
    if (status === 'assigned') setStatus('in_progress');
    setIdentifyRow(null);
    const name = target ? target.patient : 'Cane';
    showToast(payload?.discrepancy
      ? `${name} identified with a flag — moved to Ready to Store`
      : `${name} identified — moved to Ready to Store`);
  };

  const removeDiscrepancy = (entry) => {
    setRows(prev => prev.map(r => {
      if (r.id !== entry.caneId) return r;
      const audit = { removedReason: entry.reason, removedDoc: entry.documentation, removedFlagBy: OPERATOR, removedFlagAt: Date.now() };
      if (entry.type === 'manual') return { ...r, manual: false, ...audit };
      if (entry.type === 'removed') return { ...r, removed: false, removedAt: undefined, removedBy: undefined, ...audit };
      // flagged field discrepancy
      return { ...r, flagged: false, flagType: undefined, flagNote: undefined, discrepancyDetail: undefined, ...audit };
    }));
    showToast(entry.reason ? `Discrepancy removed — ${entry.reason}` : 'Discrepancy removed from the report');
  };

  // Resolve a flagged discrepancy: keep it on the report as resolved, unblock completion.
  const resolveDiscrepancy = (entry) => {
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.id !== entry.caneId) return r;
      const evs = [{ type: 'resolved', label: 'Discrepancy resolved', at, by: OPERATOR }];
      if (entry.transportBack) evs.push({ type: 'located', label: 'Transport back to clinic requested', at: at + 1, by: OPERATOR });
      return {
        ...r,
        flagged: false,
        resolvedDiscrepancy: { type: r.flagType || (r.manual ? 'Manually Added' : 'Discrepancy'), detail: r.discrepancyDetail, note: entry.note, files: entry.files || [], transportBack: !!entry.transportBack, by: OPERATOR, at },
        events: [...(r.events || []), ...evs],
      };
    }));
    showToast(entry.transportBack ? 'Resolved · transport back requested' : 'Discrepancy resolved');
  };

  // Add a follow-up note to an open discrepancy WITHOUT resolving it.
  const addFollowUp = (entry) => {
    const at = Date.now();
    setRows(prev => prev.map(r => {
      if (r.id !== entry.caneId) return r;
      const ev = { type: 'located', label: 'Follow-up added to discrepancy', at, by: OPERATOR };
      return {
        ...r,
        followUps: [...(r.followUps || []), { note: entry.note, files: entry.files || [], by: OPERATOR, at }],
        events: [...(r.events || []), ev],
      };
    }));
    showToast('Follow-up added');
  };

  const confirmFollowModal = () => {
    if (!followNote.trim()) return;
    addFollowUp({ caneId: followTarget.caneId, note: followNote.trim(), files: followFiles.map(f => f.name) });
    closeFollow();
  };

  const confirmResolveModal = () => {
    if (!resolveNote.trim()) return;
    resolveDiscrepancy({ caneId: resolveTarget.caneId, note: resolveNote.trim(), files: resolveFiles.map(f => f.name), transportBack: resolveTransportBack });
    closeResolve();
  };
  const confirmRemoveModal = () => {
    if (!removeReason || !removeDoc.trim()) return;
    removeDiscrepancy({ type: removeTarget.type, caneId: removeTarget.caneId, reason: removeReason, documentation: removeDoc.trim() });
    closeRemove();
  };

  const handleMarkShipperDone = (id) => {
    setDoneShippers(prev => prev.includes(id) ? prev : [...prev, id]);
    // advance to next un-done shipper
    const next = SHIPPERS.find(s => s.id !== id && !doneShippers.includes(s.id));
    if (next) setCurrentShipper(next.id);
  };

  return (
    <div className="app">
      <Sidebar/>
      <main>
        {discrepancySheetOpen ? (
          <DiscrepancyView
            rows={rows}
            onClose={() => setDiscrepancySheetOpen(false)}
            onOpenCane={(id) => setOpenRowId(id)}
          />
        ) : (
          <>
        <div className="page-header">
          <div className="page-header-l">
            <div className="page-header-eyebrow">
              <span>Worklist</span>
              <span className="crumb-sep">›</span>
              <span className="crumb-cur">Bulk Intake</span>
            </div>
            <div className="page-header-title-row">
              <h1>Bulk Intake<span className="ticket-id mono">TKT-2026-04-27-001</span></h1>
            </div>
            <div className="intake-progress">
              <strong>Shipper {currentShipper} of {SHIPPERS.length}</strong>
              <span className="ip-sep">·</span>
              {curIdentified} of {curShipperCanes} canes identified
              <span className="ip-sep">·</span>
              {placedDoneCount} of {liveRows.length} stored
            </div>
          </div>
          <div className="page-header-r">
            <div className="demo-tools">
              <span className="demo-tools-label">Demo tools</span>
              <button className="demo-tool-btn" onClick={() => { reset(); }} title="Reset prototype state">Reset</button>
              <button className="demo-tool-btn" onClick={demoSkipSeal} title="Skip the seal + canister photo step for the current shipper and jump to the ID Canes table">Skip seal photos</button>
              <button className="demo-tool-btn" onClick={demoLoadDiscrepancies} title="Promote a batch of canes to Ready to Store with assorted discrepancy types (field mismatch, multi-field, damaged, damaged + field, manually added)">Load discrepancies</button>
              {!intakeComplete && (
                <button className="demo-tool-btn" onClick={demoAllStored} title="Jump to the final state with every cane Stored">All stored</button>
              )}
              {applied && <button className="demo-tool-btn" onClick={() => setShowAfterState(s => !s)}>{showAfterState ? 'View: before apply' : 'View: after apply'}</button>}
            </div>
            <div className="page-header-actions">
              <button className="btn-outline" onClick={() => showToast('Opening transportation record TKT-2026-04-27-001')} title="View the linked transportation record">
                <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M1 17V5a1 1 0 0 1 1-1h13v13H1z"/><path d="M15 8h4l3 3v6h-7"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/></svg>
                  View Transportation
                </span>
              </button>
              <div className="assign-control" title="Assign this intake">
                <span className="assign-label">Assigned to</span>
                <select
                  className="assign-select"
                  value={assignee}
                  onChange={(e) => { setAssignee(e.target.value); showToast(`Intake assigned to ${e.target.value}`); }}>
                  <option value="John Smith (Me)">John Smith (Me)</option>
                  <option value="Sarah Chen">Sarah Chen</option>
                  <option value="Dev Patel">Dev Patel</option>
                  <option value="James Okoro">James Okoro</option>
                </select>
              </div>
              {intakeComplete ? (
                <span className="badge completed" style={{height:34,padding:'0 14px',fontSize:12}}><Icon.Check size={11}/>Intake Complete</span>
              ) : (
                <button
                  className="btn-teal"
                  disabled={!canComplete}
                  onClick={() => setShowCompleteModal(true)}
                  title={canComplete
                    ? 'Finalize chain-of-custody and discrepancy reports on the transport record'
                    : "You can't complete intake until all canes are placed and discrepancies are resolved"}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Check size={11}/>Complete Intake</span>
                </button>
              )}
            </div>
          </div>
        </div>

        <Stepper status={status}/>

        <TicketInfo ticket={TICKET}/>

        {/* Tabs — three-stage workflow */}
        <div className="tabs">
          <button className={`tab ${tab === 'identification' ? 'active' : ''}`} onClick={() => setTab('identification')} title="Confirm data + scan tag/EPC">
            <span style={{display:'inline-flex',alignItems:'center',gap:6}}><span className="tab-step">1</span>ID Canes</span>
            <span className="count">{idRows.length}</span>
          </button>
          <button className={`tab ${tab === 'verified' ? 'active' : ''}`} onClick={() => setTab('verified')} title="Mass apply locations in confirmed order">
            <span style={{display:'inline-flex',alignItems:'center',gap:6}}><span className="tab-step">2</span>Ready to Store</span>
            <span className="count">{verifiedRows.length}</span>
          </button>
          <button className={`tab ${tab === 'placed' ? 'active' : ''}`} onClick={() => setTab('placed')} title="Scanned into vault location">
            <span style={{display:'inline-flex',alignItems:'center',gap:6}}><span className="tab-step">3</span>Stored</span>
            <span className="count">{placedRows.length}</span>
          </button>
          <span style={{marginLeft:'auto', alignSelf:'center', display:'flex', gap:8, paddingBottom:6}}>
            <button
              className="btn-outline"
              style={flaggedCount > 0
                ? {padding:'5px 12px',fontSize:11.5,border:'1px solid #f98080',color:'#f98080',background:'rgba(249,128,128,0.08)',fontWeight:700}
                : {padding:'5px 12px',fontSize:11.5,fontWeight:600}}
              onClick={() => setDiscrepancySheetOpen(true)}
              title="View all flagged canes">
              <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                <Icon.Warn/>
                {flaggedCount > 0
                  ? `${flaggedCount} open discrepanc${flaggedCount === 1 ? 'y needs' : 'ies need'} review`
                  : 'Discrepancies'}
              </span>
            </button>
          </span>
        </div>

        {tab === 'identification' && (
          !sealVerified[currentShipper]?.caneTopVerifiedAt ? (
            /* ---- Starting point: one focused task, verify the shipper ---- */
            <>
              <div className="stage-intro">
                <div className="si-eyebrow">Step 1 of 3 · ID Canes</div>
                <div className="si-text">Start by confirming the shipper arrived sealed. The two checks below capture chain-of-custody evidence. No canes can be identified until both are done.</div>
              </div>

              <SealVerifyPanel
                shipperId={currentShipper}
                shipperLabel={(SHIPPERS.find(s => s.id === currentShipper) || {}).label || ''}
                shipperSource={(SHIPPERS.find(s => s.id === currentShipper) || {}).source || ''}
                verification={sealVerified[currentShipper]}
                operator={OPERATOR}
                onUpdate={(v) => setSealVerified(prev => ({...prev, [currentShipper]: {...(prev[currentShipper] || {}), ...v}}))}
                onComplete={(v) => setSealVerified(prev => ({...prev, [currentShipper]: v}))}
              />
            </>
          ) : (
            /* ---- Working view: identify the canes ---- */
            <>
              <div className="stage-intro">
                <div className="si-eyebrow">Step 1 of 3 · ID Canes</div>
                <div className="si-text">Pull each cane, confirm patient and specimen data, and print the RFID tag. Identified canes flow to <strong style={{color:'#fff'}}>Ready to Store</strong> in identification order.</div>
              </div>

              <ShipperBar
                shippers={SHIPPERS}
                currentShipper={currentShipper}
                counts={shipperCounts}
                onAdvance={handleSelectShipper}
                sealVerified={sealVerified}
              />

              <SealVerifiedBanner
                shipperId={currentShipper}
                verification={sealVerified[currentShipper]}
                onAddPhotos={(items) => setSealVerified(prev => {
                  const cur = prev[currentShipper] || {};
                  return {...prev, [currentShipper]: {...cur, caneTopPhotos: [...(cur.caneTopPhotos || []), ...items]}};
                })}
              />

              <SearchBox
                value={search}
                onChange={setSearch}
                resultCount={searchedRows.length}
                totalCount={currentShipperRows.length}
                rightSlot={
                  <button className="btn-outline" style={{padding:'7px 13px',fontSize:12.5,whiteSpace:'nowrap'}} onClick={() => setShowAddCane(true)} title="Add a cane that was not on the import file">
                    <span style={{display:'inline-flex',alignItems:'center',gap:6}}>+ Add cane</span>
                  </button>
                }
              />

              <IdentificationTable
                rows={searchedRows}
                onIdentify={handleIdentify}
                onOpenDrawer={(id) => setOpenRowId(id)}
                openRowId={openRowId}
                search={search}
                reactiveLocked={reactiveLocked}
                patientCounts={patientCounts}
              />
            </>
          )
        )}

        {tab === 'verified' && (
          <>
            <div className="stage-intro">
              <div className="si-eyebrow">Step 2 of 3 · Ready to Store — Assign Locations</div>
              <div className="si-text">Identified canes are listed in confirmation order. Use <strong style={{color:'#fff'}}>Suggest Location</strong> to pick a fresh canister and fill slots sequentially, then confirm. Each cane then needs a vault scan to move to <strong style={{color:'#fff'}}>Stored</strong>.</div>
            </div>

            <div className="assign-sticky-wrap">
              <BulkAssignBar
                sort={sort} setSort={setSort}
                sortDir={sortDir} setSortDir={setSortDir}
                anchor={anchor}
                onSuggest={handleSuggest}
                applied={applied}
              />
              {applied && appliedSummary && !summaryDismissed && (
                <ApplySummary
                  assigned={appliedSummary.assigned}
                  reactiveSkipped={appliedSummary.reactiveSkipped}
                  pending={proposedCount}
                  onDismiss={() => setSummaryDismissed(true)}
                  onConfirmAll={confirmAllProposed}
                />
              )}
            </div>

            <SearchBox
              value={search}
              onChange={setSearch}
              resultCount={searchedRows.length}
              totalCount={tabRows.length}
            />

            <WorkingTable
              rows={searchedRows}
              onConfirmRow={confirmRowLocation}
              onOpenDrawer={(id) => setOpenRowId(id)}
              openRowId={openRowId}
              onPlaceRow={placeRow}
              patientCounts={patientCounts}
            />
          </>
        )}

        {suggestOpen && (
          <SuggestModal
            onCancel={() => setSuggestOpen(false)}
            onApply={applySuggestion}
            count={verifiedRows.filter(r => r.reactivity !== 'Reactive' && r.reactivity !== 'Pending').length}
          />
        )}

        

        {showCompleteModal && (
          <CompleteIntakeModal
            count={liveRows.length}
            onConfirm={() => { setIntakeComplete(true); setStatus('completed'); setShowCompleteModal(false); }}
            onClose={() => setShowCompleteModal(false)}
          />
        )}

        {showAddCane && (
          <AddCaneModal
            shipperId={currentShipper}
            onAdd={handleAddManualCane}
            onClose={() => setShowAddCane(false)}
          />
        )}

        {tab === 'placed' && (
          <>
            <div className="stage-intro">
              <div className="si-eyebrow">Step 3 of 3 · Stored</div>
              <div className="si-text">Final vault location confirmed by scan at the tank. These canes are locked.</div>
            </div>
            <CompletedTable rows={placedRows.length ? placedRows : completed} onOpenDrawer={(id) => setOpenRowId(id)}/>
          </>
        )}

        <div className="table-footer">
          <div className="left">
            <span>{visibleCount} {tab === 'identification' ? 'canes to ID' : tab === 'verified' ? 'canes ready to store' : 'canes stored'}</span>
            {applied && tab === 'verified' && <span style={{color:'#6b7280'}}>· last apply: just now</span>}
          </div>
        </div>
                </>
        )}

        {toast && (
          <div className="cf-toast" role="status">
            <Icon.Check size={13}/>{toast}
          </div>
        )}

        {openRow && (
          <CaneDrawer
            row={openRow}
            rowIndex={openRowIndex}
            totalRows={allRows.length}
            onClose={() => setOpenRowId(null)}
            onPrev={goPrev}
            onNext={goNext}
            onSetLocation={(id, loc) => handleSetLocation(id, loc)}
            onSaveFlag={(id, type, note) => handleSaveFlag(id, type, note)}
            onResolveFlag={(id, type, note) => handleResolveFlag(id, type, note)}
            onAddFlag={(id, type, note) => handleAddFlag(id, type, note)}
            onToggleManual={handleToggleManual}
            onRemoveRow={handleRemoveRow}
            onConfirmIdentify={(id, payload) => { confirmIdentify(id, payload); setOpenRowId(null); }}
            onRequestResolve={(t) => setResolveTarget(t)}
            onRequestRemove={(t) => setRemoveTarget(t)}
            onRequestFollowUp={(t) => setFollowTarget(t)}
            fromDiscrepancy={discrepancySheetOpen}
          />
        )}

        {removeTarget && (
          <ModalShell
            title="Remove discrepancy from report?"
            sub={`This clears the flag on cane RFID ${removeTarget.rfid && removeTarget.rfid !== '\u2014' ? removeTarget.rfid : '(no tag)'} and removes it from the transport discrepancy report. A reason and documentation are required and kept on the audit trail.`}
            onClose={closeRemove}>
            <div style={{marginBottom:12}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Reason for removal *</div>
              <select className="cryo-input" value={removeReason} onChange={(e) => setRemoveReason(e.target.value)}>
                <option value="" disabled>Select a reason…</option>
                <option value="Resolved with clinic">Resolved with clinic</option>
                <option value="Data entry error">Data entry error on manifest</option>
                <option value="Duplicate flag">Duplicate flag</option>
                <option value="Verified correct on re-check">Verified correct on re-check</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Documentation *</div>
              <textarea className="cryo-input" rows={3} value={removeDoc} onChange={(e) => setRemoveDoc(e.target.value)}
                placeholder="Describe why this is being removed and any reference (clinic call, email, ticket #). Recorded with your name and timestamp." style={{resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn-outline" onClick={closeRemove}>Cancel</button>
              <button className="btn-teal" disabled={!removeReason || !removeDoc.trim()} onClick={confirmRemoveModal}
                title={(!removeReason || !removeDoc.trim()) ? 'Select a reason and add documentation to continue' : 'Remove discrepancy'}
                style={{opacity:(!removeReason || !removeDoc.trim())?0.5:1,cursor:(!removeReason || !removeDoc.trim())?'not-allowed':'pointer',borderColor:'#f98080',background:'#f98080',color:'#2a0e0e'}}>
                Remove discrepancy
              </button>
            </div>
          </ModalShell>
        )}

        {followTarget && (
          <ModalShell
            title="Add follow-up"
            sub={`Log an update for cane RFID ${followTarget.rfid && followTarget.rfid !== '\u2014' ? followTarget.rfid : '(no tag)'} (${followTarget.flagType}). This adds a note to the discrepancy and keeps it open — it does not resolve it.`}
            onClose={closeFollow}>
            <div style={{marginBottom:14}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Follow-up note *</div>
              <textarea className="cryo-input" rows={3} value={followNote} onChange={(e) => setFollowNote(e.target.value)}
                placeholder="Add an update — e.g. left voicemail with clinic, awaiting corrected manifest, escalated to lab lead. Recorded with your name and timestamp." style={{resize:'vertical'}}/>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Attach files <span style={{textTransform:'none',letterSpacing:0,color:'#6b7280',fontWeight:500}}>(optional)</span></div>
              <input ref={followFileRef} type="file" multiple style={{display:'none'}} onChange={(e) => {
                const fs = Array.from(e.target.files || []);
                if (fs.length) setFollowFiles(prev => [...prev, ...fs.map(f => ({ name: f.name }))]);
                e.target.value = '';
              }}/>
              <button className="btn-outline" style={{padding:'7px 13px',fontSize:12.5}} onClick={() => followFileRef.current?.click()}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Download/>Attach files</span>
              </button>
              {followFiles.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
                  {followFiles.map((f, i) => (
                    <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 8px',background:'rgba(255,255,255,0.04)',border:'1px solid #2a2d36',borderRadius:4,fontSize:11.5,color:'#cbd5e1'}}>
                      {f.name}
                      <span style={{cursor:'pointer',color:'#6b7280'}} onClick={() => setFollowFiles(prev => prev.filter((_, idx) => idx !== i))}><Icon.X/></span>
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn-outline" onClick={closeFollow}>Cancel</button>
              <button className="btn-teal" disabled={!followNote.trim()} onClick={confirmFollowModal}
                title={!followNote.trim() ? 'Add a note to continue' : 'Add follow-up'}
                style={{opacity:followNote.trim()?1:0.5,cursor:followNote.trim()?'pointer':'not-allowed'}}>
                Add follow-up
              </button>
            </div>
          </ModalShell>
        )}

        {resolveTarget && (
          <ModalShell
            title="Resolve discrepancy"
            sub={`Mark the discrepancy on cane RFID ${resolveTarget.rfid && resolveTarget.rfid !== '\u2014' ? resolveTarget.rfid : '(no tag)'} (${resolveTarget.flagType}) as resolved. It stays on the report as resolved and intake completion can proceed. The cane can still be stored. Use Add follow-up instead if it is not yet resolved.`}
            onClose={closeResolve}>
            <div style={{marginBottom:14}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Resolution notes *</div>
              <textarea className="cryo-input" rows={3} value={resolveNote} onChange={(e) => setResolveNote(e.target.value)}
                placeholder="How was this resolved? Include clinic confirmation, corrected value, or reference. Recorded with your name and timestamp." style={{resize:'vertical'}}/>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{display:'block',fontSize:11,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>Attach files <span style={{textTransform:'none',letterSpacing:0,color:'#6b7280',fontWeight:500}}>(optional — photos, clinic email, signed form)</span></div>
              <input ref={resolveFileRef} type="file" multiple style={{display:'none'}} onChange={(e) => {
                const fs = Array.from(e.target.files || []);
                if (fs.length) setResolveFiles(prev => [...prev, ...fs.map(f => ({ name: f.name }))]);
                e.target.value = '';
              }}/>
              <button className="btn-outline" style={{padding:'7px 13px',fontSize:12.5}} onClick={() => resolveFileRef.current?.click()}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Download/>Attach files</span>
              </button>
              {resolveFiles.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
                  {resolveFiles.map((f, i) => (
                    <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 8px',background:'rgba(255,255,255,0.04)',border:'1px solid #2a2d36',borderRadius:4,fontSize:11.5,color:'#cbd5e1'}}>
                      {f.name}
                      <span style={{cursor:'pointer',color:'#6b7280'}} onClick={() => setResolveFiles(prev => prev.filter((_, idx) => idx !== i))}><Icon.X/></span>
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div style={{marginBottom:14}}>
              <button
                onClick={() => setResolveTransportBack(v => !v)}
                title="Flag this cane to be transported back to the originating clinic. It still resolves normally and is tracked for return shipment."
                style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:6,cursor:'pointer',fontFamily:'inherit',textAlign:'left',border:'1px solid '+(resolveTransportBack?'var(--cryo-cyan)':'#2a2d36'),background:resolveTransportBack?'rgba(24,227,187,0.08)':'transparent'}}>
                <span style={{width:16,height:16,borderRadius:4,border:'1px solid '+(resolveTransportBack?'var(--cryo-cyan)':'#3a3d46'),background:resolveTransportBack?'var(--cryo-cyan)':'transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#06231d'}}>{resolveTransportBack && <Icon.Check size={11}/>}</span>
                <span style={{display:'flex',flexDirection:'column'}}>
                  <span style={{fontSize:13,fontWeight:600,color:resolveTransportBack?'#5eead4':'#e5e7eb'}}>Request transport back to clinic</span>
                  <span style={{fontSize:11,color:'#6b7280',marginTop:1}}>Resolves normally and tracks this cane for return shipment.</span>
                </span>
              </button>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
              <button className="btn-outline" onClick={closeResolve}>Cancel</button>
              <button className="btn-teal" disabled={!resolveNote.trim()} onClick={confirmResolveModal}
                title={!resolveNote.trim() ? 'Add resolution notes to continue' : 'Mark resolved'}
                style={{opacity:resolveNote.trim()?1:0.5,cursor:resolveNote.trim()?'pointer':'not-allowed'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6}}><Icon.Check size={11}/>Mark resolved</span>
              </button>
            </div>
          </ModalShell>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body></html>
